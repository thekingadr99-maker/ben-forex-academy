  "7-1-0": { title: "Order Flow Analysis", content: `### Order Flow — Dòng lệnh

### Footprint Chart
- Hiển thị volume mua/bán tại MỖI mức giá
- Bid volume vs Ask volume
- Cho thấy aggressive buyers vs sellers

### Delta
- Delta = Ask Volume - Bid Volume
- Delta dương → Aggressive buying
- Delta âm → Aggressive selling
- Cumulative Delta → Tích lũy theo thời gian

### Ứng dụng
- Delta dương + Giá tăng → Uptrend mạnh
- Delta dương + Giá giảm → Absorption (hidden selling)
- Volume cluster tại 1 mức giá → S/R mạnh

⚠️ Order flow analysis cần data từ futures market (CME). Forex spot không có centralized volume.` },

  "7-1-1": { title: "Market Depth (DOM)", content: `### DOM — Depth of Market

### Level 2 Data
Hiển thị tất cả limit orders đang chờ ở mỗi mức giá.

- Bid side: Các lệnh Buy Limit
- Ask side: Các lệnh Sell Limit
- Cho thấy supply/demand tại real-time

### Time & Sales (Tape)
- Hiển thị MỖI giao dịch được thực hiện
- Thời gian, giá, volume, direction
- Cho thấy aggressive orders

### Ứng dụng
- Large order tại 1 level → Potential S/R
- Absorption: Large bid order hold → Hỗ trợ giá
- Spoofing: Fake large orders → Cẩn thận

⚠️ DOM analysis khó áp dụng cho Forex spot (OTC, decentralized).` },

  "7-1-2": { title: "Auction Market Theory", content: `### Auction Market Theory (AMT)

### Concept
Thị trường là cuộc đấu giá liên tục giữa buyers và sellers.

### Value Area
- Vùng giá mà 70% volume được giao dịch
- **VAH:** Value Area High
- **VAL:** Value Area Low
- **POC:** Point of Control (volume cao nhất)

### Initial Balance (IB)
- Range của 1 giờ đầu tiên mỗi ngày
- Giá trong IB → Day trading range
- Giá break IB → Trend day

### Cách trade AMT
- Giá trên VA → Buyers kiểm soát
- Giá dưới VA → Sellers kiểm soát
- Giá quay lại VA → Mean reversion
- Giá break VA → Trend continuation` },

  "7-1-3": { title: "Seasonal Patterns", content: `### Forex Seasonality

### Seasonal Tendencies
- **Tháng 1:** USD thường yếu (January Effect)
- **Tháng 4-5:** "Sell in May and go away"
- **Tháng 9-10:** Volatility tăng
- **Tháng 12:** Low liquidity, range nhỏ

### Day of Week
- **Thứ 2:** Slow start, gap fill
- **Thứ 3-4:** Most active, best trading
- **Thứ 5:** Volatility trước NFP (nếu có)
- **Thứ 6:** Profit taking, reduce exposure

### Lưu ý
- Seasonality là **tendency**, KHÔNG phải guarantee
- Chỉ dùng làm bias thêm, không trade một mình
- Backtest seasonal patterns trước khi áp dụng` },

  "7-1-4": { title: "Options Analysis", content: `### Options-based Analysis cho Forex

### 25-Delta Risk Reversal
- Chênh lệch implied volatility giữa call và put options
- Positive → Bullish bias
- Negative → Bearish bias

### Implied Volatility
- IV cao → Thị trường kỳ vọng biến động lớn
- IV thấp → Thị trường kỳ vọng yên tĩnh
- IV spike trước events → Cẩn thận

### Options Expiry
- Large options expiry → Giá có thể bị "pin" tại strike
- Weekly vs Monthly expiry
- Check options data từ CME

### Ứng dụng
- IV tăng → Mở rộng SL, giảm lot
- Risk Reversal extreme → Contrarian signal
- Options barrier → Potential S/R` },

  "7-1-5": { title: "Central Bank Intervention", content: `### NHTW can thiệp tỷ giá

### Cách can thiệp
**1. Verbal Intervention:**
- NHTW phát ngôn nhằm ảnh hưởng tỷ giá
- "Chúng tôi sẽ hành động nếu cần"
- Ít tốn kém nhất nhưng hiệu quả giảm dần

**2. Direct Intervention:**
- NHTW mua/bán ngoại tệ trực tiếp
- Tác động mạnh, nhưng tạm thời
- Ví dụ: BOJ mua USD/JPY khi JPY quá mạnh

**3. Policy Change:**
- Thay đổi lãi suất, QE, YCC
- Tác động dài hạn nhất

### Dấu hiệu can thiệp sắp xảy ra
- Tỷ giá đạt mức extreme (ví dụ: USD/JPY > 150)
- NHTW phát ngôn mạnh hơn bình thường
- Tần suất meeting tăng

⚠️ KHÔNG BAO GIỜ trade ngược NHTW khi họ đang can thiệp.` },

  "7-1-6": { title: "Geopolitical Risk", content: `### Geopolitical Risk Premium

### Ảnh hưởng Geopolitics đến Forex
- Chiến tranh, xung đột → Safe haven tăng (JPY, CHF, Gold)
- Bầu cử → Uncertainty → Volatility tăng
- Sanctions → Ảnh hưởng đồng tiền bị sanction

### Safe Haven Flows
- Khi rủi ro địa chính trị tăng:
  - JPY tăng
  - CHF tăng
  - Gold tăng
  - USD tăng (trong crisis lớn)

### Cách trade
- Theo dõi tin tức geopolitical
- Risk events → Giảm exposure
- Crisis → Mua safe haven
- Post-crisis → Mean reversion

### Lưu ý
- Geopolitical risk khó dự đoán
- Tác động thường ngắn hạn (trừ chiến tranh)
- Ưu tiên bảo toàn vốn khi uncertainty cao` },

  "7-2-0": { title: "Carry Trade", content: `### Carry Trade Strategy

### Concept
Mua đồng tiền lãi suất CAO, bán đồng tiền lãi suất THẤP → Hưởng swap dương.

### Ví dụ
Buy AUD/JPY:
- AUD interest: 4.35%
- JPY interest: -0.10%
- Spread: ~4.45%/năm (swap dương)

### Điều kiện thành công
- Chênh lệch lãi suất lớn
- Tỷ giá ổn định hoặc đi theo hướng có lợi
- Low volatility environment

### Rủi ro
- Tỷ giá đi ngược → Loss > swap income
- Risk off → Carry trade unwind (JPY tăng mạnh)
- NHTW thay đổi lãi suất

### Quy tắc
- Chỉ carry trade khi risk on
- SL bắt buộc
- Position size nhỏ hơn bình thường` },

  "7-2-1": { title: "Statistical Arbitrage", content: `### Stat Arb & Pair Trading

### Pair Trading
Tìm 2 cặp tiền tương quan cao → Trade khi tương quan bị lệch.

### Quy trình
1. Tìm pairs có correlation > 0.85
2. Tính spread (ratio hoặc difference)
3. Tính Z-score của spread
4. Entry khi Z-score > 2 (hoặc < -2)
5. Exit khi Z-score quay về 0

### Ví dụ
- EUR/USD và GBP/USD: Correlation ~0.85
- Spread = EUR/USD - β × GBP/USD
- Z-score > 2 → EUR quá đắt vs GBP → Sell EUR, Buy GBP
- Z-score quay 0 → Exit

### Rủi ro
- Correlation breakdown → Loss cả 2 chân
- Mean reversion không xảy ra
- Execution risk (slippage)

⚠️ Stat Arb cần code và automation. Khó thực hiện manual.` },

  "7-2-2": { title: "Grid Trading", content: `### Grid Trading

### Concept
Đặt lệnh Buy và Sell ở các mức giá cách đều nhau (grid).

### Setup
- Chọn range (ví dụ: 1.0800 - 1.1000)
- Grid spacing: 20 pips
- TP mỗi lệnh: 20 pips
- Đặt Buy Limit mỗi 20 pips xuống + Sell Limit mỗi 20 pips lên

### Ưu điểm
- Kiếm tiền trong range market
- Không cần dự đoán hướng

### Nhược điểm NGHIÊM TRỌNG
- Nếu giá trend 1 chiều → Floating loss KHỔNG LỒ
- Cần vốn lớn
- Có thể cháy tài khoản

⚠️ Grid trading BẮT BUỘC có stop loss tổng cho toàn grid. Nhiều trader đã cháy tài khoản vì grid trading.` },

  "7-2-3": { title: "Martingale", content: `### Martingale & Anti-Martingale

### Martingale (CỰC KỲ NGUY HIỂM)
- Gấp đôi lot mỗi khi thua
- Thua $100 → $200 → $400 → $800...
- Lý thuyết: 1 lệnh thắng sẽ gỡ hết
- Thực tế: 7-8 lệnh thua liên tiếp → CHÁY TÀI KHOẢN

⚠️ **KHÔNG BAO GIỜ dùng Martingale thuần túy.**

### Anti-Martingale (An toàn hơn)
- Tăng lot khi THẮNG, giảm lot khi THUA
- Tận dụng winning streak
- Giảm thiệt hại khi losing streak

### Modified Martingale
- Tăng lot nhẹ (1.5x thay vì 2x) với DCA
- PHẢI có max number of levels
- PHẢI có total SL
- Vẫn rủi ro cao — chỉ dành cho expert` },

  "7-2-4": { title: "Multi-Strategy Portfolio", content: `### Multi-Strategy Portfolio

### Tại sao cần nhiều chiến lược?
- Không strategy nào hoạt động tốt mọi lúc
- Trending strategy + Range strategy = Smoother equity
- Giảm drawdown tổng thể

### Ví dụ Portfolio
| Chiến lược | Allocation | Market |
|-----------|-----------|--------|
| Trend Following | 40% | Trending |
| Mean Reversion | 30% | Ranging |
| Breakout | 20% | High vol |
| Carry Trade | 10% | Low vol |

### Correlation giữa strategies
- Strategies có correlation thấp → Diversification tốt
- 2 strategies cùng perform khi trend → Correlation cao → Ít diversification` },

  "7-2-5": { title: "Prop Firm Challenge", content: `### Prop Firm — Giao dịch với vốn người khác

### Prop Firm phổ biến
- **FTMO:** Phổ biến nhất
- **MyForexFunds (MFF)**
- **The Funded Trader (TFT)**
- **True Forex Funds**

### Cách hoạt động
1. Trả phí challenge (~$150-500)
2. Hoàn thành challenge (target 8-10% trong 30 ngày)
3. Verification phase (target 5% trong 60 ngày)
4. Nhận funded account ($10K-$200K)
5. Trade → Chia lợi nhuận 70-90%

### Rules phổ biến
- Max Daily DD: 5%
- Max Total DD: 10%
- Min trading days: 5
- Không trade tin (tùy firm)

### Tips
- Không cố trade aggressive để đạt target nhanh
- Consistency > Aggression
- 1-2% risk/trade, RR 1:2+` },

  "7-2-6": { title: "Funding & Scaling", content: `### Con đường Funding

### Lộ trình thực tế

**Phase 1: Demo (3-6 tháng)**
- Học và practice
- Xây dựng trading plan
- Track record demo

**Phase 2: Small Live ($100-500)**
- Micro lots
- Focus on process, not profit
- Build confidence

**Phase 3: Prop Firm ($10K-100K)**
- Challenge FTMO/MFF
- Trade với vốn lớn, risk nhỏ
- 70-90% profit split

**Phase 4: Full-time ($50K+ funded)**
- Multiple funded accounts
- Income từ trading
- Scale up dần

### Reality Check
- 90% trader thua lỗ
- Cần 1-3 năm consistent profitability
- Không có shortcut — chỉ có kỷ luật và kiên nhẫn` },

  "8-0-0": { title: "Demo sang Live", content: `### Chuyển từ Demo sang Live

### Khi nào sẵn sàng?
- ✅ 3+ tháng profitable trên demo
- ✅ Drawdown < 15%
- ✅ Trading plan rõ ràng
- ✅ Risk management nghiêm ngặt
- ✅ Tâm lý ổn định

### Vốn tối thiểu
- Micro lot trading: $200-500
- Mini lot trading: $2,000-5,000
- Standard lot: $10,000+

### Sự khác biệt Demo vs Live
- **Tâm lý:** Live = tiền thật = cảm xúc mạnh hơn 10x
- **Execution:** Live có thể slippage, requote
- **Kỷ luật:** Dễ phá rule khi tiền thật

### Tips chuyển đổi
- Bắt đầu với **lot nhỏ nhất** (0.01)
- Trade 1 tháng minimum lot → Quen tâm lý
- Tăng lot dần khi consistent` },

  "8-0-1": { title: "Track Record", content: `### Track Record — Lịch sử giao dịch

### Tại sao cần Track Record?
- Chứng minh ability với bản thân
- Cần cho Prop Firm application
- Cơ sở để tăng vốn

### Track Record tốt
- Tối thiểu **6 tháng** trên live account
- Consistent monthly return (3-5%/tháng)
- Max drawdown < 15-20%
- Profit Factor > 1.5
- Sharpe Ratio > 1.0

### Công cụ tracking
- **Myfxbook:** Auto-verify, public profile
- **FXBlue:** Detailed analytics
- **FXStat:** Portfolio tracking

### Lưu ý
- Track record phải **verified** (kết nối trực tiếp broker)
- Không ai tin screenshot → Cần third-party verification` },

  "8-0-2": { title: "Income Planning", content: `### Khi nào trading income thay thế lương?

### Tính toán
- Lương hiện tại: $1,500/tháng
- Target từ trading: $1,500/tháng
- Nếu return 5%/tháng → Cần vốn: $30,000
- Nếu return 3%/tháng → Cần vốn: $50,000

### Quy tắc
- Có **12 tháng living expenses** trong savings
- Trading income **stable** ít nhất 6 tháng
- Vốn trading >= 20x monthly income target
- KHÔNG nghỉ việc chỉ vì 2-3 tháng good

### Alternative Path
- Giữ job + trade part-time (swing/position)
- Tăng vốn dần từ savings + trading profit
- Chuyển full-time khi income stable 12+ tháng` },

  "8-0-3": { title: "Tax & Legal", content: `### Thuế trading tại Việt Nam

### Hiện tại (2024-2025)
- Forex trading chưa được quản lý chính thức tại VN
- Không có khung pháp lý rõ ràng cho retail forex
- Thu nhập từ trading: Thuế TNCN (nếu khai báo)

### Lưu ý pháp lý
- Trade qua broker quốc tế (không phải sàn VN)
- Giữ record mọi giao dịch để khai thuế
- Tham vấn chuyên gia thuế cho trường hợp cụ thể

### Quốc tế
- **US:** Forex taxed as ordinary income hoặc 60/40 rule
- **UK:** Spread betting = tax free; CFD = capital gains
- **Singapore:** Không thuế capital gains

⚠️ Luật thay đổi thường xuyên. Luôn check với chuyên gia thuế trước khi quyết định.` },

  "8-0-4": { title: "Networking", content: `### Xây dựng mạng lưới Trader

### Lợi ích Networking

// ─── MARKDOWN RENDERER ───
function Md({ text }) {
  if (!text) return null;
  const lines = text.split('\n');
  const elements = [];
  let i = 0;
  let tableRows = [];
  let inTable = false;

  const renderInline = (str) => {
    const parts = [];
    let remaining = str;
    let idx = 0;
    // Bold + Code inline
    const regex = /(\*\*(.+?)\*\*)|(`(.+?)`)/g;
    let match;
    let lastEnd = 0;
    while ((match = regex.exec(remaining)) !== null) {
      if (match.index > lastEnd) parts.push(<span key={idx++}>{remaining.slice(lastEnd, match.index)}</span>);
      if (match[2]) parts.push(<strong key={idx++} style={{ color: "#F1F5F9", fontWeight: 700 }}>{match[2]}</strong>);
      if (match[4]) parts.push(<code key={idx++} style={{ background: "#334155", padding: "1px 6px", borderRadius: 4, fontSize: "0.88em", color: "#38BDF8" }}>{match[4]}</code>);
      lastEnd = match.index + match[0].length;
    }
    if (lastEnd < remaining.length) parts.push(<span key={idx++}>{remaining.slice(lastEnd)}</span>);
    return parts.length ? parts : str;
  };

  while (i < lines.length) {
    const line = lines[i];

    // Table
    if (line.trim().startsWith('|')) {
      if (!inTable) { tableRows = []; inTable = true; }
      if (!line.trim().match(/^\|[\s-:|]+\|$/)) {
        tableRows.push(line.trim().split('|').filter(c => c.trim() !== '').map(c => c.trim()));
      }
      i++;
      if (i >= lines.length || !lines[i]?.trim().startsWith('|')) {
        inTable = false;
        const isHeader = tableRows.length > 0;
        elements.push(
          <div key={`t${i}`} style={{ overflowX: "auto", margin: "12px 0" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
              {isHeader && <thead><tr>{tableRows[0].map((h, j) => <th key={j} style={{ padding: "8px 12px", background: "#334155", color: "#E2E8F0", fontWeight: 700, textAlign: "left", borderBottom: "2px solid #475569", whiteSpace: "nowrap" }}>{renderInline(h)}</th>)}</tr></thead>}
              <tbody>{tableRows.slice(1).map((row, ri) => <tr key={ri}>{row.map((cell, ci) => <td key={ci} style={{ padding: "6px 12px", borderBottom: "1px solid #1E293B", color: "#CBD5E1" }}>{renderInline(cell)}</td>)}</tr>)}</tbody>
            </table>
          </div>
        );
      }
      continue;
    }

    // Code block
    if (line.trim().startsWith('```')) {
      const codeLines = [];
      i++;
      while (i < lines.length && !lines[i].trim().startsWith('```')) {
        codeLines.push(lines[i]);
        i++;
      }
      elements.push(
        <pre key={`c${i}`} style={{ background: "#0F172A", border: "1px solid #334155", borderRadius: 8, padding: 14, overflowX: "auto", fontSize: 12, lineHeight: 1.6, color: "#38BDF8", margin: "12px 0" }}>
          <code>{codeLines.join('\n')}</code>
        </pre>
      );
      i++;
      continue;
    }

    // Headers
    if (line.startsWith('### ')) {
      elements.push(<h3 key={i} style={{ fontSize: 16, fontWeight: 800, color: "#F1F5F9", margin: "20px 0 8px", borderBottom: "1px solid #334155", paddingBottom: 6 }}>{line.slice(4)}</h3>);
      i++; continue;
    }

    // List items
    if (line.startsWith('- ')) {
      const listItems = [];
      while (i < lines.length && lines[i].startsWith('- ')) {
        listItems.push(lines[i].slice(2));
        i++;
      }
      elements.push(
        <ul key={`l${i}`} style={{ margin: "8px 0", paddingLeft: 20 }}>
          {listItems.map((item, j) => <li key={j} style={{ marginBottom: 4, lineHeight: 1.6, color: "#CBD5E1", fontSize: 13.5 }}>{renderInline(item)}</li>)}
        </ul>
      );
      continue;
    }

    // Warning/Highlight
    if (line.startsWith('⚠️') || line.startsWith('💡')) {
      elements.push(
        <div key={i} style={{ background: line.startsWith('⚠️') ? "#7C2D1220" : "#0D948820", border: `1px solid ${line.startsWith('⚠️') ? "#7C2D1244" : "#0D948844"}`, borderRadius: 8, padding: "10px 14px", margin: "12px 0", fontSize: 13, lineHeight: 1.6, color: "#E2E8F0" }}>
          {renderInline(line)}
        </div>
      );
      i++; continue;
    }

    // Diagram
    if (line.trim().startsWith('[DIAGRAM:') && line.trim().endsWith(']')) {
      const dName = line.trim().slice(9, -1);
      if (DIAGRAMS[dName]) {
        elements.push(<div key={i} style={{ margin: "16px 0" }} dangerouslySetInnerHTML={{ __html: DIAGRAMS[dName] }} />);
      }
      i++; continue;
    }

    // Empty line
    if (line.trim() === '') { i++; continue; }

    // Paragraph
    elements.push(<p key={i} style={{ margin: "8px 0", lineHeight: 1.7, color: "#CBD5E1", fontSize: 13.5 }}>{renderInline(line)}</p>);
    i++;
  }
  return <>{elements}</>;
}

                        <div style={{ fontSize: 11, color: "#64748B" }}>{p.subtitle} • {topicCount} chủ đề</div>
                      </div>
                      <div style={{ fontSize: 18, fontWeight: 800, color: prog > 0 ? p.color : "#334155" }}>{prog}%</div>
                    </div>
                    <p style={{ fontSize: 12, color: "#94A3B8", margin: "0 0 10px", lineHeight: 1.4 }}>{p.desc}</p>
                    <div style={{ height: 4, borderRadius: 2, background: "#0F172A" }}>
                      <div style={{ height: "100%", borderRadius: 2, width: `${prog}%`, background: p.color, transition: "width .5s" }} />
                    </div>
                  </button>
                );
              })}
            </div>

            <div style={{ marginTop: 24, padding: "16px 20px", borderRadius: 12, background: "linear-gradient(135deg, #1E293B, #172033)", border: "1px solid #38BDF844" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                <span style={{ fontSize: 18 }}>📌</span>
                <span style={{ fontSize: 14, fontWeight: 800, color: "#F1F5F9" }}>Chú thích ký hiệu</span>
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 12 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 14px", borderRadius: 8, background: "#FBBF2415", border: "1px solid #FBBF2433" }}>
                  <span style={{ fontSize: 16 }}>🔑</span>
                  <span style={{ fontSize: 12, color: "#FBBF24", fontWeight: 700 }}>Kiến thức nền tảng quan trọng — Ưu tiên học trước</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 14px", borderRadius: 8, background: "#22C55E15", border: "1px solid #22C55E33" }}>
                  <span style={{ fontSize: 14 }}>✅</span>
                  <span style={{ fontSize: 12, color: "#22C55E", fontWeight: 700 }}>Đã hoàn thành</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 14px", borderRadius: 8, background: "#64748B15", border: "1px solid #64748B33" }}>
                  <span style={{ fontSize: 14 }}>○</span>
                  <span style={{ fontSize: 12, color: "#94A3B8", fontWeight: 700 }}>Chưa học</span>
                </div>
              </div>
            </div>

            <div style={{ marginTop: 30, padding: "18px 20px", borderRadius: 12, background: "#1E293B", border: "1px solid #334155", fontSize: 12, color: "#94A3B8", lineHeight: 1.8 }}>
              <strong style={{ color: "#FBBF24" }}>💡 Cách sử dụng:</strong><br />
              • Nhấn vào từng giai đoạn để xem danh sách bài học chi tiết<br />
              • Nhấn vào từng bài học để đọc kiến thức đầy đủ<br />
              • Tick hoàn thành để theo dõi tiến độ<br />• Bài có dấu 🔑 = Kiến thức nền tảng quan trọng, ưu tiên học trước<br />
              • Dùng thanh tìm kiếm để nhảy nhanh đến bài học cần thiết
            </div>
            </div>

            {/* ─── DONATE PANEL (RIGHT SIDE) ─── */}
            {winWidth > 900 && <div style={{ width: 220, flexShrink: 0, position: "sticky", top: 70 }}>
              <div style={{ background: "linear-gradient(180deg, #1E293B, #15202E)", borderRadius: 16, border: "1px solid #334155", overflow: "hidden" }}>
                <div style={{ background: "linear-gradient(135deg, #38BDF8, #818CF8)", padding: "10px 14px", textAlign: "center", borderRadius: "16px 16px 0 0" }}>
                  <span style={{ fontSize: 13, fontWeight: 800, color: "#fff", letterSpacing: "0.5px" }}>Thanks for the support!</span>
                </div>
                <div style={{ padding: "12px" }}>
                  <div style={{ borderRadius: 10, overflow: "hidden", border: "2px solid #33415566", marginBottom: 10 }}>
                    <img src={QR_IMG} alt="QR Donate" style={{ width: "100%", display: "block" }} />
                  </div>
                  <p style={{ fontSize: 11, color: "#94A3B8", lineHeight: 1.6, textAlign: "center" }}>
                    Cảm ơn anh em đã ủng hộ <strong style={{ color: "#FBBF24" }}>Ben</strong> để có động lực phát triển và duy trì nền tảng này! 🙏
                  </p>
                </div>
              </div>

              {/* ─── EXNESS REFERRAL ─── */}
              <div style={{ marginTop: 14, background: "linear-gradient(135deg, #1E293B, #172033)", borderRadius: 16, border: "1px solid #334155", overflow: "hidden" }}>
                <div style={{ background: "linear-gradient(135deg, #F59E0B, #D97706)", padding: "10px 14px", textAlign: "center" }}>
                  <span style={{ fontSize: 13, fontWeight: 800, color: "#fff", letterSpacing: "0.3px" }}>📈 Đăng ký Exness</span>
                </div>
                <div style={{ padding: "14px 12px" }}>
                  <p style={{ fontSize: 11, color: "#CBD5E1", lineHeight: 1.6, textAlign: "center", marginBottom: 10 }}>
                    Mở tài khoản trade tại <strong style={{ color: "#F59E0B" }}>Exness</strong> qua link bên dưới để ủng hộ Ben nhé!
                  </p>
                  <a href="https://one.exnessonelink.com/a/8avkcsc3jr" target="_blank" rel="noopener noreferrer" style={{ display: "block", padding: "10px", borderRadius: 8, background: "linear-gradient(135deg, #F59E0B, #D97706)", color: "#fff", fontSize: 12, fontWeight: 800, textAlign: "center", textDecoration: "none", marginBottom: 8 }}>
                    Đăng ký Exness ngay →
                  </a>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <input 
                      readOnly 
                      value="8avkcsc3jr" 
                      style={{ flex: 1, padding: "7px 8px", borderRadius: 6, border: "1px solid #334155", background: "#0F172A", color: "#94A3B8", fontSize: 9, outline: "none", minWidth: 0 }}
                    />
                    <button 
                      onClick={() => { navigator.clipboard.writeText("8avkcsc3jr"); const b = event.currentTarget; b.textContent = "✓"; setTimeout(() => b.textContent = "Copy", 1500); }}
                      style={{ padding: "7px 12px", borderRadius: 6, border: "1px solid #F59E0B44", background: "#F59E0B22", color: "#F59E0B", fontSize: 10, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}
                    >Copy</button>
                  </div>
                  <p style={{ fontSize: 10, color: "#FBBF24", textAlign: "center", marginTop: 8, lineHeight: 1.5, fontWeight: 700 }}>
                    Copy code này và gắn vào phần Partner code khi đăng ký Exness để ủng hộ Ben nhé 🙏
                  </p>
                </div>
              </div>
            </div>}
          </div>
        )}

        {/* ─── PHASE VIEW ─── */}
        {view === "phase" && phase && (
          <div style={{ padding: "24px", maxWidth: 800, margin: "0 auto" }}>
            <button onClick={() => setView("home")} style={{ border: "none", background: "none", color: "#64748B", fontSize: 12, cursor: "pointer", marginBottom: 12, padding: 0 }}>← Trang chủ</button>

            <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 20 }}>
              <span style={{ fontSize: 40 }}>{phase.icon}</span>
              <div>
                <h1 style={{ margin: 0, fontSize: 22, fontWeight: 900, color: phase.color }}>{phase.title}</h1>
                <p style={{ margin: "4px 0 0", color: "#94A3B8", fontSize: 13 }}>{phase.subtitle} • {phase.desc}</p>
              </div>
            </div>

            {phase.modules.map((mod, mi) => (
              <div key={mi} style={{ background: "#1E293B", borderRadius: 12, border: "1px solid #33415566", marginBottom: 14, overflow: "hidden" }}>
                <div style={{ padding: "14px 18px", borderBottom: "1px solid #33415544", display: "flex", alignItems: "center" }}>
                  <h3 style={{ margin: 0, fontSize: 15, fontWeight: 700, color: "#E2E8F0", flex: 1 }}>{mod.name}</h3>
                  <span style={{ fontSize: 11, color: "#64748B" }}>
                    {mod.topics.filter((_, ti) => completed[`${phase.id}-${mi}-${ti}`]).length}/{mod.topics.length}
                  </span>
                </div>
                {mod.topics.map((topic, ti) => {
                  const key = `${phase.id}-${mi}-${ti}`;
                  const isDone = completed[key];
                  return (
                    <div key={ti} style={{ display: "flex", alignItems: "center", padding: "0 18px", borderBottom: ti < mod.topics.length - 1 ? "1px solid #ffffff06" : "none" }}>
                      <input type="checkbox" checked={!!isDone} onChange={() => toggleComplete(key)}
                        style={{ accentColor: phase.color, cursor: "pointer", marginRight: 12, flexShrink: 0 }} />
                      <button onClick={() => openLesson(phase.id, mi, ti)}
                        style={{ flex: 1, padding: "11px 0", border: "none", background: "none", color: isDone ? "#64748B" : "#CBD5E1", fontSize: 13, textAlign: "left", cursor: "pointer", textDecoration: isDone ? "line-through" : "none", lineHeight: 1.5 }}>
                        {topic}
                      </button>
                      <span style={{ color: "#334155", fontSize: 14, marginLeft: 8 }}>→</span>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        )}

        {/* ─── LESSON VIEW ─── */}
        {view === "lesson" && activeLesson && lessonData && (
          <div style={{ padding: "24px", maxWidth: 780, margin: "0 auto" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
              <button onClick={() => openPhase(activeLesson.phaseId)} style={{ border: "none", background: "none", color: "#64748B", fontSize: 12, cursor: "pointer", padding: 0 }}>
                ← {phase?.title}
              </button>
              <span style={{ color: "#334155" }}>/</span>
              <span style={{ fontSize: 12, color: "#64748B" }}>
                {phase?.modules[activeLesson.mi]?.name}
              </span>
            </div>

            {/* Lesson Header */}
            <div style={{ background: `${phase?.color}10`, border: `1px solid ${phase?.color}33`, borderRadius: 14, padding: "20px 24px", marginBottom: 20 }}>
              <div style={{ display: "flex", alignItems: "flex-start", gap: 14 }}>
                <span style={{ fontSize: 32 }}>{phase?.icon}</span>
                <div style={{ flex: 1 }}>
                  <h1 style={{ margin: 0, fontSize: 20, fontWeight: 800, color: "#F1F5F9", lineHeight: 1.3 }}>{lessonData.title}</h1>
                  <p style={{ margin: "6px 0 0", fontSize: 12, color: "#94A3B8" }}>
                    {phase?.title} • {phase?.modules[activeLesson.mi]?.name}
                  </p>
                </div>
                <button onClick={() => toggleComplete(`${activeLesson.phaseId}-${activeLesson.mi}-${activeLesson.ti}`)}
                  style={{ border: `2px solid ${phase?.color}`, borderRadius: 8, padding: "6px 14px", background: completed[`${activeLesson.phaseId}-${activeLesson.mi}-${activeLesson.ti}`] ? phase?.color : "transparent", color: completed[`${activeLesson.phaseId}-${activeLesson.mi}-${activeLesson.ti}`] ? "#fff" : phase?.color, fontSize: 12, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}>
                  {completed[`${activeLesson.phaseId}-${activeLesson.mi}-${activeLesson.ti}`] ? "✓ Hoàn thành" : "Đánh dấu xong"}
                </button>
              </div>
            </div>

            {/* Lesson Content */}
            <div style={{ background: "#1E293B", borderRadius: 14, padding: "24px 28px", border: "1px solid #33415566", lineHeight: 1.7 }}>
              <Md text={lessonData.content} />
            </div>

            {/* Navigation */}
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 20, gap: 12 }}>
              {currentLessonIdx > 0 ? (
                <button onClick={() => { const prev = allLessons[currentLessonIdx - 1]; openLesson(prev.phaseId, prev.mi, prev.ti); }}
                  style={{ flex: 1, padding: "12px 16px", border: "1px solid #334155", borderRadius: 10, background: "#1E293B", color: "#94A3B8", fontSize: 12, cursor: "pointer", textAlign: "left" }}>
                  ← Bài trước<br /><span style={{ color: "#CBD5E1", fontWeight: 600, fontSize: 11 }}>{allLessons[currentLessonIdx - 1].title.slice(0, 40)}...</span>
                </button>
              ) : <div style={{ flex: 1 }} />}
              {currentLessonIdx < allLessons.length - 1 ? (
                <button onClick={() => { const next = allLessons[currentLessonIdx + 1]; openLesson(next.phaseId, next.mi, next.ti); }}
                  style={{ flex: 1, padding: "12px 16px", border: "1px solid #334155", borderRadius: 10, background: "#1E293B", color: "#94A3B8", fontSize: 12, cursor: "pointer", textAlign: "right" }}>
                  Bài tiếp →<br /><span style={{ color: "#CBD5E1", fontWeight: 600, fontSize: 11 }}>{allLessons[currentLessonIdx + 1].title.slice(0, 40)}...</span>
                </button>
              ) : <div style={{ flex: 1 }} />}
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(AuthWrapper));
</script>
</body>
</html>
