  // Phase 2 - Technical Analysis
  "2-0-0": { title: "Cấu trúc thị trường", content: `### Market Structure

Cấu trúc thị trường là **nền tảng quan trọng nhất** của Price Action. Hiểu được cấu trúc = hiểu được xu hướng.

### Uptrend (Xu hướng tăng)
- Giá tạo **Higher High (HH)** và **Higher Low (HL)** liên tiếp
- Mỗi đỉnh cao hơn đỉnh trước
- Mỗi đáy cao hơn đáy trước
- **Chiến lược:** Buy tại vùng HL (pullback)

### Downtrend (Xu hướng giảm)
- Giá tạo **Lower High (LH)** và **Lower Low (LL)** liên tiếp
- Mỗi đỉnh thấp hơn đỉnh trước
- Mỗi đáy thấp hơn đáy trước
- **Chiến lược:** Sell tại vùng LH (pullback)

### Sideways/Range
- Giá dao động giữa vùng Support và Resistance
- Không tạo HH/HL hoặc LH/LL rõ ràng
- **Chiến lược:** Buy tại Support, Sell tại Resistance

### Break of Structure (BOS)
Khi giá phá vỡ cấu trúc hiện tại:
- Trong uptrend, giá phá xuống dưới HL gần nhất → **Cảnh báo đảo chiều**
- Trong downtrend, giá phá lên trên LH gần nhất → **Cảnh báo đảo chiều**

⚠️ **Luôn xác nhận BOS bằng nến đóng cửa (close), không phải bóng nến (wick).**` },

  "2-0-1": { title: "Mô hình nến Nhật", content: `[DIAGRAM:candlestick]\n\n### Candlestick Patterns — Tất cả mô hình quan trọng

**Nến đảo chiều đơn (Single Candle):**

| Mô hình | Hình dáng | Ý nghĩa |
|---------|-----------|---------|
| **Hammer** | Thân nhỏ, râu dưới dài (≥2x thân) | Đảo chiều tăng tại đáy |
| **Inverted Hammer** | Thân nhỏ, râu trên dài | Đảo chiều tăng tiềm năng |
| **Shooting Star** | Thân nhỏ, râu trên dài | Đảo chiều giảm tại đỉnh |
| **Hanging Man** | Giống Hammer nhưng ở đỉnh | Đảo chiều giảm |
| **Doji** | Open ≈ Close | Bất quyết, có thể đảo chiều |

**Nến đảo chiều đôi (Double Candle):**
- **Bullish Engulfing:** Nến xanh "nuốt trọn" nến đỏ trước → Đảo chiều tăng
- **Bearish Engulfing:** Nến đỏ "nuốt trọn" nến xanh trước → Đảo chiều giảm
- **Bullish/Bearish Harami:** Nến sau nằm trong thân nến trước → Tín hiệu yếu hơn Engulfing

**Mô hình 3 nến:**
- **Morning Star:** Nến đỏ + Doji/thân nhỏ + Nến xanh lớn → Đảo chiều tăng mạnh
- **Evening Star:** Nến xanh + Doji/thân nhỏ + Nến đỏ lớn → Đảo chiều giảm mạnh
- **Three White Soldiers:** 3 nến xanh liên tiếp, mỗi nến đóng cửa cao hơn → Uptrend mạnh
- **Three Black Crows:** 3 nến đỏ liên tiếp → Downtrend mạnh

### Lưu ý quan trọng
- Mô hình nến **PHẢI** xuất hiện tại vùng S/R, supply/demand quan trọng mới có giá trị
- Nến trên TF lớn (H4, D1) đáng tin hơn TF nhỏ (M5, M15)
- Luôn **chờ nến đóng cửa** mới xác nhận mô hình` },

  "2-0-2": { title: "🔑 Support & Resistance", content: `[DIAGRAM:support_resistance]\n\n### Support (Hỗ trợ)
Vùng giá mà **lực mua mạnh hơn lực bán**, giá có xu hướng bật lên.

### Resistance (Kháng cự)  
Vùng giá mà **lực bán mạnh hơn lực mua**, giá có xu hướng quay đầu giảm.

### Cách xác định S/R mạnh
1. **Số lần test:** Giá đã chạm vùng đó bao nhiêu lần? Càng nhiều → càng mạnh
2. **Timeframe:** S/R trên D1, W1 mạnh hơn H1, M15
3. **Volume:** Nến tại vùng S/R có volume cao → xác nhận mạnh
4. **Phản ứng giá:** Giá phản ứng mạnh (nến lớn, rejection wick dài) → S/R mạnh

### S/R Flip (Role Reversal)
Khi Support bị phá vỡ → Trở thành Resistance mới (và ngược lại).

Đây là một trong những concept **quan trọng nhất** trong trading:
- Giá phá xuống support → Pullback lên test lại vùng đó (giờ là resistance) → Entry Sell
- Giá phá lên resistance → Pullback xuống test lại (giờ là support) → Entry Buy

### Vùng (Zone) vs Đường (Line)
- S/R là **VÙNG**, không phải đường chính xác
- Vẽ S/R zone bằng rectangle tool, bao phủ wicks và bodies` },

  "2-1-0": { title: "Moving Averages", content: `### Các loại Moving Average

**SMA (Simple Moving Average):**
- Trung bình cộng đơn giản của N nến gần nhất
- SMA 20 = Trung bình 20 nến gần nhất
- Ưu: Ổn định, ít nhiễu. Nhược: Chậm phản ứng

**EMA (Exponential Moving Average):**
- Trọng số cao hơn cho giá gần nhất
- Phản ứng nhanh hơn SMA
- Phổ biến: EMA 9, 21, 50, 200

### Chiến lược sử dụng

**1. Dynamic Support/Resistance:**
- EMA 20/21: S/R ngắn hạn (cho scalping/day trading)
- EMA 50: S/R trung hạn (cho swing trading)
- EMA/SMA 200: S/R dài hạn — **MA quan trọng nhất**

**2. Golden Cross & Death Cross:**
- **Golden Cross:** MA ngắn cắt LÊN MA dài → Tín hiệu tăng
- **Death Cross:** MA ngắn cắt XUỐNG MA dài → Tín hiệu giảm
- Phổ biến: EMA 50 & EMA 200

**3. MA Ribbon:**
- Dùng nhiều MA (9, 21, 50, 100, 200) tạo "dải băng"
- Khi các MA xếp theo thứ tự → Trend mạnh
- Khi các MA đan xen → Sideways, không nên trade

### Mẹo thực chiến
- Giá trên EMA 200 → Ưu tiên Buy
- Giá dưới EMA 200 → Ưu tiên Sell
- Không dùng MA crossover một mình để entry — cần thêm xác nhận` },

  "2-1-1": { title: "RSI - Relative Strength Index", content: `### RSI là gì?

RSI đo **sức mạnh tương đối** giữa lực mua và lực bán trong N kỳ (mặc định: 14).

**Công thức:** RSI = 100 - (100 / (1 + RS))
Trong đó RS = Trung bình tăng / Trung bình giảm

### Vùng Overbought & Oversold
- **RSI > 70:** Overbought (quá mua) → Cảnh báo có thể giảm
- **RSI < 30:** Oversold (quá bán) → Cảnh báo có thể tăng
- **RSI = 50:** Vùng trung tính, ranh giới bull/bear

⚠️ **SAI LẦM PHỔ BIẾN:** RSI > 70 ≠ phải bán ngay! Trong uptrend mạnh, RSI có thể duy trì trên 70 rất lâu.

### RSI Divergence — Tín hiệu MẠNH

**Bullish Divergence (Phân kỳ tăng):**
- Giá tạo Lower Low nhưng RSI tạo Higher Low
- → Momentum giảm đang yếu đi → Có thể đảo chiều tăng

**Bearish Divergence (Phân kỳ giảm):**
- Giá tạo Higher High nhưng RSI tạo Lower High
- → Momentum tăng đang yếu đi → Có thể đảo chiều giảm

**Hidden Divergence:** Tín hiệu tiếp tục xu hướng
- Hidden Bullish: Giá HL + RSI LL → Uptrend tiếp tục
- Hidden Bearish: Giá LH + RSI HH → Downtrend tiếp tục

### Cách dùng RSI tốt nhất
- Kết hợp RSI divergence với vùng S/R
- RSI trên TF H4, D1 đáng tin hơn M5, M15` },

  "2-1-9": { title: "Fibonacci", content: `[DIAGRAM:fibonacci]\n\n### Fibonacci trong Trading

Fibonacci Retracement dựa trên dãy số Fibonacci (1, 1, 2, 3, 5, 8, 13, 21...) và tỷ lệ vàng.

### Fibonacci Retracement — Các mức quan trọng

| Mức | Ý nghĩa | Cách dùng |
|-----|---------|-----------|
| **23.6%** | Retracement nông | Trend rất mạnh |
| **38.2%** | Retracement phổ biến | Entry tốt trong trend mạnh |
| **50%** | Mức tâm lý (không phải Fib thật) | Rất phổ biến |
| **61.8%** | **"Golden Ratio"** — Mức QUAN TRỌNG NHẤT | Entry lý tưởng |
| **78.6%** | Retracement sâu | Cẩn thận, có thể đảo chiều |

### Cách vẽ Fibonacci Retracement
1. Xác định swing point rõ ràng (đỉnh & đáy)
2. **Uptrend:** Kéo từ **Swing Low → Swing High**
3. **Downtrend:** Kéo từ **Swing High → Swing Low**
4. Chờ giá pullback về các mức Fib → Tìm entry

### Fibonacci Extension — Đặt Take Profit
Các mức extension phổ biến: 127.2%, 161.8%, 200%, 261.8%

### Confluence — Sức mạnh thật sự
Fib mạnh nhất khi **trùng với** các yếu tố khác:
- Fib 61.8% + S/R zone → **Rất mạnh**
- Fib 50% + EMA 50 → **Confluence tốt**
- Fib + Order Block + FVG → **SMC entry**` },

  // Phase 3 - Fundamental Analysis
  "3-0-0": { title: "🔑 GDP, CPI, PPI, PCE", content: `### Các chỉ số kinh tế quan trọng

**GDP (Gross Domestic Product)**
- Tổng sản phẩm quốc nội — đo lường quy mô kinh tế
- Công bố: Hàng quý (Advance, Preliminary, Final)
- GDP tăng → Kinh tế mạnh → Đồng tiền có xu hướng tăng
- GDP giảm 2 quý liên tiếp = **Suy thoái (Recession)**

**CPI (Consumer Price Index)**
- Chỉ số giá tiêu dùng — đo lường **lạm phát**
- **Core CPI:** Loại bỏ Food & Energy (biến động mạnh)
- CPI cao → NHTW có thể **tăng lãi suất** → Đồng tiền tăng
- CPI thấp → NHTW có thể **giảm lãi suất** → Đồng tiền giảm
- Mục tiêu lạm phát của FED: 2%

**PPI (Producer Price Index)**
- Chỉ số giá sản xuất — "leading indicator" của CPI
- PPI tăng → Chi phí sản xuất tăng → CPI có thể tăng theo

**PCE (Personal Consumption Expenditures)**
- Chỉ số chi tiêu tiêu dùng cá nhân
- **Core PCE** là thước đo lạm phát **ưa thích của FED**
- Quan trọng hơn CPI đối với quyết định lãi suất của FED

### Cách trade khi có tin
- So sánh **Actual vs Forecast** (không phải Previous)
- Chênh lệch càng lớn → Biến động càng mạnh
- Chờ 5-15 phút sau tin để tránh whipsaw` },

  "3-0-1": { title: "🔑 Non-Farm Payrolls (NFP)", content: `### NFP là gì?

**Non-Farm Payrolls** là báo cáo việc làm phi nông nghiệp của Mỹ, công bố vào **thứ 6 đầu tiên hàng tháng, lúc 8:30 ET (19:30 VN)**.

**Tại sao quan trọng?**
- Phản ánh sức khỏe thị trường lao động Mỹ
- Ảnh hưởng trực tiếp đến quyết định lãi suất của FED
- Là tin tức **biến động mạnh nhất** hàng tháng (50-200+ pips)

### Các thành phần NFP
- **Jobs Added:** Số việc làm mới tạo ra (headline number)
- **Unemployment Rate:** Tỷ lệ thất nghiệp
- **Average Hourly Earnings:** Thu nhập trung bình/giờ (đo lạm phát tiền lương)

### Cách đọc NFP

| Kịch bản | Tác động USD |
|----------|-------------|
| Jobs cao + Earnings cao | USD tăng mạnh |
| Jobs cao + Earnings thấp | USD tăng vừa |
| Jobs thấp + Earnings cao | Hỗn loạn, khó đoán |
| Jobs thấp + Earnings thấp | USD giảm mạnh |

### Chiến lược trade NFP an toàn
1. **Tránh trade trước NFP 30 phút** — spread mở rộng
2. **Chờ nến 15 phút đầu đóng** — tránh whipsaw
3. **Dùng pending order:** Buy Stop + Sell Stop (straddle)
4. **Giảm lot size** — biến động lớn = rủi ro lớn
5. **Hoặc đơn giản: KHÔNG TRADE NFP** khi mới bắt đầu` },

  // Phase 4 - Trading Strategies
  "4-0-0": { title: "🔑 Order Block (OB)", content: `[DIAGRAM:order_block]\n\n### Order Block là gì?

**Order Block** là vùng giá nơi **Smart Money (ngân hàng, tổ chức lớn)** đặt lệnh lớn, tạo ra sự mất cân bằng cung-cầu.

### Cách xác định Order Block

**Bullish Order Block:**
1. Tìm nến đỏ/giảm **cuối cùng** trước một cú tăng mạnh (impulsive move up)
2. Đánh dấu vùng từ **Open đến Low** của nến đỏ đó
3. Đó là vùng mua tiềm năng

**Bearish Order Block:**
1. Tìm nến xanh/tăng **cuối cùng** trước một cú giảm mạnh
2. Đánh dấu vùng từ **Open đến High** của nến xanh đó
3. Đó là vùng bán tiềm năng

### Điều kiện OB hợp lệ
- OB phải tạo ra **Break of Structure (BOS)** — đẩy giá phá cấu trúc
- OB chưa bị **mitigated** (giá chưa quay lại test)
- OB trên TF lớn (H4, D1) mạnh hơn TF nhỏ

### Cách trade Order Block
1. Xác định OB trên TF lớn (H4/D1)
2. Chờ giá pullback về vùng OB
3. Chuyển sang TF nhỏ (M15/H1) tìm confirmation
4. Entry với SL đặt dưới/trên OB
5. TP tại vùng liquidity hoặc OB đối diện

### OB + FVG Confluence
Khi Order Block **trùng với Fair Value Gap** → Setup rất mạnh, xác suất cao.` },

  "4-0-1": { title: "🔑 Fair Value Gap (FVG)", content: `### FVG / Imbalance là gì?

**Fair Value Gap** là vùng giá mà thị trường di chuyển **quá nhanh**, tạo ra khoảng trống — nơi cung cầu chưa cân bằng.

### Cách xác định FVG

Cần 3 nến liên tiếp:
- **Bullish FVG:** High của nến 1 THẤP HƠN Low của nến 3 → Khoảng trống giữa = FVG
- **Bearish FVG:** Low của nến 1 CAO HƠN High của nến 3 → Khoảng trống giữa = FVG

### Tại sao FVG quan trọng?

Thị trường có xu hướng **quay lại "lấp đầy"** các FVG trước khi tiếp tục xu hướng. Đây là nơi Smart Money "rebalance" vị thế.

### Cách trade FVG
1. Xác định FVG trên chart (H1, H4, D1)
2. Chờ giá pullback về vùng FVG
3. Entry tại **50% của FVG** (Consequent Encroachment — CE)
4. SL đặt ngoài FVG
5. TP tại swing high/low tiếp theo

### FVG Rules
- FVG chưa bị lấp (unfilled) = vẫn hợp lệ
- FVG đã bị lấp 1 phần = vẫn có thể phản ứng tại CE (50%)
- FVG đã bị lấp hoàn toàn = invalidated
- FVG trên TF cao = mạnh hơn, cần nhiều thời gian hơn để fill` },

  // Phase 5 - Risk Management
  "5-0-0": { title: "Quy tắc 1-2%", content: `[DIAGRAM:risk_reward]\n\n### Quy tắc quản lý rủi ro số 1

**KHÔNG BAO GIỜ rủi ro quá 1-2% tài khoản cho MỘT lệnh.**

Đây là quy tắc **QUAN TRỌNG NHẤT** trong trading. Mọi trader chuyên nghiệp đều tuân thủ.

### Tại sao 1-2%?

Với rủi ro 2% mỗi lệnh, bạn cần thua **35 lệnh liên tiếp** để mất 50% tài khoản. Xác suất gần như bằng 0.

| Rủi ro/lệnh | Số lệnh thua để mất 50% | Xác suất xảy ra |
|-------------|------------------------|-----------------|
| 2% | 35 lệnh | Gần 0% |
| 5% | 14 lệnh | Rất thấp |
| 10% | 7 lệnh | Có thể xảy ra! |
| 25% | 3 lệnh | Rất dễ xảy ra! |

### Công thức tính Lot Size

\`\`\`
Lot Size = (Account Balance × Risk%) / (SL pips × Pip Value per Lot)
\`\`\`

**Ví dụ thực tế:**
- Account: $5,000
- Risk: 1% = $50
- SL: 40 pips
- Pip Value (1 standard lot EUR/USD): $10

→ Lot Size = $50 / (40 × $10) = $50 / $400 = **0.125 lot**
→ Làm tròn xuống: **0.12 lot**

### Quy tắc mở rộng
- **Max 3-5 lệnh cùng lúc** → Tổng rủi ro ≤ 6-10%
- **Daily Loss Limit:** Thua 3% trong ngày → DỪNG trade
- **Weekly Loss Limit:** Thua 6% trong tuần → Nghỉ, review lại` },

  // Phase 6 - Psychology
  "6-0-0": { title: "FOMO", content: `### FOMO — Fear of Missing Out

**FOMO** là nỗi sợ bỏ lỡ cơ hội, khiến trader vào lệnh **không theo plan**, thường khi thấy giá đang chạy mạnh.

### Dấu hiệu FOMO
- Thấy giá tăng/giảm mạnh → Muốn nhảy vào ngay
- Thấy người khác khoe lệnh thắng → Muốn trade giống họ
- Vào lệnh không có setup rõ ràng, chỉ vì "sợ lỡ"
- Tăng lot size bất thường vì muốn bù lại cơ hội đã bỏ lỡ

### Tại sao FOMO nguy hiểm?
- Entry tại vùng giá xấu (đuổi giá)
- Không có SL hợp lý (vì vào muộn, SL quá xa)
- RR ratio bất lợi
- Cảm xúc chi phối thay vì logic

### Cách khắc phục

**1. Có Trading Plan rõ ràng:**
- Biết chính xác mình tìm setup gì
- Nếu không có setup → Không trade. Đơn giản vậy thôi.

**2. Nhắc nhở bản thân:**
- "Thị trường mở cửa 5 ngày/tuần, 52 tuần/năm"
- "Cơ hội LUÔN LUÔN quay lại"
- "Lệnh tốt nhất là lệnh KHÔNG vào khi không có setup"

**3. Rule cứng:**
- Nếu nến đã di chuyển >50% expected move → BỎ QUA
- Nếu không trong watchlist → KHÔNG TRADE
- Chờ pullback, không bao giờ đuổi giá` },

  "6-0-1": { title: "🔑 Revenge Trading", content: `### Revenge Trading là gì?

Sau khi thua lệnh, trader cảm thấy tức giận và muốn **"trả thù" thị trường** bằng cách vào lệnh ngay lập tức, thường với lot size lớn hơn.

### Vòng lặp chết người
1. Thua lệnh → Tức giận
2. Vào lệnh mới ngay (không có setup) → Thua tiếp
3. Càng tức hơn → Tăng lot size → Thua nặng hơn
4. Mất kiểm soát → Cháy tài khoản

### Nguyên nhân gốc
- **Ego:** "Mình không thể sai"
- **Loss Aversion:** Đau đớn vì mất tiền gấp 2x niềm vui khi được tiền
- **Thiếu kỷ luật:** Không có quy tắc dừng trade khi thua

### Giải pháp

**1. Daily Loss Limit (QUAN TRỌNG):**
- Quy tắc: Thua 2-3 lệnh HOẶC thua 3% vốn/ngày → **TẮT MÁY, NGHỈ**
- Không ngoại lệ. Không thương lượng.

**2. Cooling Period:**
- Sau mỗi lệnh thua: Nghỉ ít nhất 30-60 phút
- Rời khỏi chart, đi dạo, tập thể dục
- Quay lại khi đầu óc tỉnh táo

**3. Process-Oriented Mindset:**
- Tập trung vào **quy trình**, không phải kết quả
- Lệnh thua theo plan = THÀNH CÔNG (vì bạn tuân thủ plan)
- Lệnh thắng không theo plan = THẤT BẠI` },

  // Phase 7 - Advanced
  "7-0-0": { title: "MQL4/MQL5 & Expert Advisor", content: `### Algorithmic Trading với MetaTrader

**MQL (MetaQuotes Language)** là ngôn ngữ lập trình được dùng để tạo:
- **Expert Advisor (EA):** Robot giao dịch tự động
- **Custom Indicator:** Chỉ báo tùy chỉnh
- **Script:** Lệnh chạy một lần

### Cấu trúc EA cơ bản (MQL4)

\`\`\`
// Khởi tạo
int OnInit() { return(INIT_SUCCEEDED); }

// Xử lý mỗi tick
void OnTick() {
    // Kiểm tra điều kiện
    double ema20 = iMA(NULL, 0, 20, 0, MODE_EMA, PRICE_CLOSE, 0);
    double ema50 = iMA(NULL, 0, 50, 0, MODE_EMA, PRICE_CLOSE, 0);
    
    // Golden Cross → Buy
    if(ema20 > ema50 && OrdersTotal() == 0) {
        OrderSend(Symbol(), OP_BUY, 0.01, Ask, 3, 
                  Ask - 50*Point, Ask + 100*Point);
    }
}
\`\`\`

### Quy trình phát triển EA
1. **Ý tưởng:** Chiến lược rõ ràng, có edge
2. **Code:** Viết EA theo chiến lược
3. **Backtest:** Strategy Tester trên data lịch sử
4. **Optimize:** Điều chỉnh parameters (cẩn thận overfitting!)
5. **Forward Test:** Chạy trên demo 3-6 tháng
6. **Live:** Bắt đầu với lot nhỏ nhất

### Cảnh báo
- 90%+ EA trên mạng là SCAM
- EA không phải "máy in tiền" — cần monitoring
- Overfitting là vấn đề lớn nhất của algo trading` },


  "2-0-3": { title: "Trendline & Channel", content: `### Trendline

**Uptrend Line:** Nối 2+ đáy (HL) liên tiếp → đường hỗ trợ động.
**Downtrend Line:** Nối 2+ đỉnh (LH) liên tiếp → đường kháng cự động.

**Quy tắc vẽ:**
- Cần tối thiểu **2 điểm** chạm để vẽ, **3 điểm** để xác nhận
- Vẽ theo **thân nến (body)** hoặc **bóng nến (wick)** — chọn 1 cách và giữ nhất quán
- Trendline càng nhiều điểm chạm → càng mạnh

### Channel (Kênh giá)
Hai trendline song song tạo thành kênh:
- **Ascending Channel:** Kênh tăng — Buy đáy kênh, Sell đỉnh kênh
- **Descending Channel:** Kênh giảm — Sell đỉnh kênh
- **Horizontal Channel:** Range — Buy support, Sell resistance

### Breakout & Retest
- **Breakout:** Giá phá vỡ trendline → tín hiệu mạnh
- **Retest:** Sau breakout, giá quay lại test trendline → entry lý tưởng
- Chờ nến **đóng cửa ngoài trendline** mới xác nhận breakout

⚠️ **Trendline bị phá ≠ đảo chiều.** Có thể chỉ là pullback sâu hơn bình thường.` },

  "2-0-4": { title: "Chart Patterns", content: `[DIAGRAM:support_resistance]

### Mô hình đảo chiều (Reversal Patterns)

**Head & Shoulders (H&S):**
- 3 đỉnh: vai trái, đầu (cao nhất), vai phải
- Neckline nối 2 đáy giữa các đỉnh
- Phá neckline → target = khoảng cách từ đầu đến neckline

**Double Top / Double Bottom:**
- Double Top: 2 đỉnh gần bằng nhau → đảo chiều giảm
- Double Bottom: 2 đáy gần bằng nhau → đảo chiều tăng
- Target = khoảng cách giữa đỉnh/đáy và neckline

### Mô hình tiếp diễn (Continuation Patterns)

**Triangle:**
- Ascending Triangle: Đỉnh bằng + đáy cao dần → breakout lên
- Descending Triangle: Đáy bằng + đỉnh thấp dần → breakout xuống
- Symmetrical Triangle: Đỉnh thấp dần + đáy cao dần → breakout 2 chiều

**Flag & Pennant:**
- Xuất hiện sau 1 cú move mạnh (flagpole)
- Flag: Kênh song song ngược chiều trend
- Pennant: Tam giác nhỏ sau flagpole
- Breakout theo chiều trend → target = chiều dài flagpole

**Wedge:**
- Rising Wedge: 2 trendline hội tụ hướng lên → bearish
- Falling Wedge: 2 trendline hội tụ hướng xuống → bullish` },

  "2-0-5": { title: "Inside Bar, Pin Bar, Fakey", content: `### Pin Bar
Nến có **râu dài ≥ 2/3 tổng chiều dài nến**, thân nhỏ.
- **Bullish Pin Bar:** Râu dưới dài, xuất hiện tại support → Buy
- **Bearish Pin Bar:** Râu trên dài, xuất hiện tại resistance → Sell
- Entry: Tại close của pin bar, SL: Đuôi pin bar

### Inside Bar
Nến mà **toàn bộ range** nằm trong range nến trước (mother bar).
- Thể hiện **sự do dự**, tích lũy trước breakout
- Trade breakout: Đặt Buy Stop trên high mother bar + Sell Stop dưới low
- Lọc theo xu hướng: Chỉ trade breakout theo trend

### Fakey Pattern (False Breakout)
- Inside bar + **false breakout** một hướng → đảo chiều mạnh
- Bước 1: Inside bar hình thành
- Bước 2: Breakout 1 hướng (false)
- Bước 3: Giá quay lại trong range mother bar → Entry ngược

### Quy tắc chung
- Các pattern này **PHẢI** xuất hiện tại key level (S/R, supply/demand)
- TF H4, D1 cho tín hiệu đáng tin nhất
- Luôn kết hợp với context (xu hướng, vùng giá)` },

  "2-0-6": { title: "Gap Analysis", content: `### Gap là gì?
Khoảng trống giá giữa close nến trước và open nến sau.

### 4 loại Gap

| Loại | Đặc điểm | Hành vi |
|------|----------|--------|
| **Common Gap** | Xuất hiện trong range | Thường bị lấp nhanh |
| **Breakaway Gap** | Tại điểm breakout S/R | Hiếm khi bị lấp |
| **Runaway Gap** | Giữa trend mạnh | Trend tiếp tục |
| **Exhaustion Gap** | Cuối trend | Sắp đảo chiều |

### Cách trade Gap
- **Gap Fill Strategy:** Common gap → đợi giá quay lại lấp gap
- **Gap & Go:** Breakaway/Runaway → trade theo hướng gap
- Forex ít gap hơn Stock (vì trade 24/5), gap thường xuất hiện đầu tuần

### Weekend Gap trong Forex
- Xảy ra khi có tin lớn cuối tuần
- ~70% gap cuối tuần bị lấp trong tuần đó
- Entry: Trade theo hướng lấp gap, SL ngoài gap` },

  "2-1-2": { title: "MACD", content: `### MACD là gì?
**Moving Average Convergence Divergence** — đo momentum và xu hướng.

**Cấu tạo:**
- **MACD Line:** EMA 12 - EMA 26
- **Signal Line:** EMA 9 của MACD Line
- **Histogram:** MACD Line - Signal Line

### Tín hiệu giao dịch

**1. Signal Line Crossover:**
- MACD cắt LÊN Signal → Bullish (Buy)
- MACD cắt XUỐNG Signal → Bearish (Sell)

**2. Zero Line Crossover:**
- MACD vượt lên 0 → Momentum tăng
- MACD xuống dưới 0 → Momentum giảm

**3. Histogram:**
- Histogram tăng dần → Momentum mạnh lên
- Histogram giảm dần → Momentum yếu đi
- Histogram đổi màu → Tín hiệu đảo chiều sớm

**4. MACD Divergence (quan trọng nhất):**
- Giá HH nhưng MACD LH → Bearish Divergence
- Giá LL nhưng MACD HL → Bullish Divergence

⚠️ MACD là indicator **chậm** (lagging). Không dùng một mình, kết hợp S/R và price action.` },

  "2-1-3": { title: "Bollinger Bands", content: `### Bollinger Bands là gì?
Gồm 3 đường bao quanh giá:
- **Middle Band:** SMA 20
- **Upper Band:** SMA 20 + 2 Standard Deviations
- **Lower Band:** SMA 20 - 2 Standard Deviations

### Các tín hiệu quan trọng

**1. Bollinger Squeeze:**
- Bands co lại → Volatility thấp → Sắp có big move
- Không biết hướng → chờ breakout rồi mới entry

**2. Bollinger Expansion:**
- Bands mở rộng → Trend mạnh đang diễn ra
- Không trade ngược trend khi bands mở rộng

**3. Walking the Band:**
- Giá liên tục chạm Upper Band → Strong uptrend
- Giá liên tục chạm Lower Band → Strong downtrend
- KHÔNG sell chỉ vì chạm Upper Band trong uptrend!

**4. Mean Reversion:**
- Trong range: Giá chạm Upper → có thể sell về Middle
- Trong range: Giá chạm Lower → có thể buy về Middle

### Kết hợp BB + RSI
- Giá chạm Lower Band + RSI < 30 → Oversold → Buy signal
- Giá chạm Upper Band + RSI > 70 → Overbought → Sell signal` },

  "2-1-4": { title: "Stochastic Oscillator", content: `### Stochastic là gì?
Đo vị trí giá hiện tại so với range cao-thấp trong N kỳ (mặc định: 14).

**Cấu tạo:**
- **%K Line:** (Close - Low14) / (High14 - Low14) × 100
- **%D Line:** SMA 3 của %K (signal line)

### Vùng quan trọng
- **> 80:** Overbought zone
- **< 20:** Oversold zone
- **50:** Vùng trung tính

### Tín hiệu giao dịch

**1. Crossover:**
- %K cắt LÊN %D trong vùng oversold (< 20) → Buy
- %K cắt XUỐNG %D trong vùng overbought (> 80) → Sell

**2. Divergence:**
- Giá LL nhưng Stochastic HL → Bullish Divergence
- Giá HH nhưng Stochastic LH → Bearish Divergence

### So sánh với RSI
| Tiêu chí | RSI | Stochastic |
|----------|-----|------------|
| Tốc độ | Chậm hơn | Nhanh hơn |
| Tín hiệu | Ít hơn | Nhiều hơn |
| Phù hợp | Swing | Scalping |
| Nhiễu | Ít | Nhiều |` },

  "2-1-5": { title: "ATR — Average True Range", content: `### ATR là gì?
**Average True Range** đo mức **biến động** (volatility) trung bình trong N kỳ.

**True Range = MAX of:**
- High - Low hiện tại
- |High - Close trước|
- |Low - Close trước|

ATR = Trung bình True Range trong N kỳ (mặc định: 14)

### Ứng dụng quan trọng

**1. Đặt Stop Loss:**
- SL = 1.5-2x ATR → Đủ room cho volatility bình thường
- Ví dụ: ATR(14) = 30 pips → SL = 45-60 pips

**2. Đo Volatility:**
- ATR cao → Thị trường biến động mạnh
- ATR thấp → Thị trường yên tĩnh

**3. Position Sizing:**
- Lot = Risk$ / (ATR × multiplier × pip value)
- Tự động điều chỉnh lot theo volatility

**4. Trailing Stop:**
- Chandelier Exit: Trailing SL = Highest High - 3×ATR
- Tự động siết SL theo volatility

### Lưu ý
- ATR **KHÔNG** cho biết hướng trend
- ATR tăng đột biến → Cẩn thận, thường xảy ra khi có tin lớn` },

  "2-1-6": { title: "Ichimoku Kinko Hyo", content: `### Ichimoku — Hệ thống hoàn chỉnh
Ichimoku cho biết: xu hướng, S/R, momentum, tín hiệu entry — tất cả trong 1.

### 5 thành phần
| Đường | Công thức | Ý nghĩa |
|-------|-----------|--------|
| **Tenkan-sen** | (High9 + Low9) / 2 | Đường chuyển đổi (nhanh) |
| **Kijun-sen** | (High26 + Low26) / 2 | Đường cơ sở (chậm) |
| **Senkou Span A** | (Tenkan + Kijun) / 2, dịch 26 kỳ | Cloud edge 1 |
| **Senkou Span B** | (High52 + Low52) / 2, dịch 26 kỳ | Cloud edge 2 |
| **Chikou Span** | Close, dịch lùi 26 kỳ | Xác nhận trend |

### Kumo Cloud (Đám mây)
- **Giá trên cloud:** Uptrend → Ưu tiên Buy
- **Giá dưới cloud:** Downtrend → Ưu tiên Sell
- **Giá trong cloud:** Choppy → Không trade
- **Cloud dày:** S/R mạnh
- **Cloud mỏng:** S/R yếu, dễ bị phá

### Tín hiệu Entry
- **TK Cross:** Tenkan cắt lên Kijun trên cloud → Strong Buy
- **TK Cross:** Tenkan cắt xuống Kijun dưới cloud → Strong Sell
- Chikou Span trên giá → Xác nhận bullish` },

  "2-1-7": { title: "Volume Profile", content: `### Volume Profile là gì?
Hiển thị **volume giao dịch** tại mỗi mức giá (horizontal volume).

### Các vùng quan trọng

**POC (Point of Control):**
- Mức giá có volume cao nhất
- Hoạt động như **S/R mạnh**
- Giá thường bị hút về POC

**Value Area (VA):**
- Vùng chứa 70% tổng volume
- **VAH (Value Area High):** Biên trên → Resistance
- **VAL (Value Area Low):** Biên dưới → Support

**HVN (High Volume Node):**
- Vùng volume cao → S/R mạnh, giá chậm qua

**LVN (Low Volume Node):**
- Vùng volume thấp → Giá di chuyển nhanh qua

### Cách trade
- Giá tiếp cận POC → Tìm reaction, có thể bounce
- Giá ở ngoài VA → Tìm cơ hội trade về VA
- Breakout qua HVN → Move mạnh có thể xảy ra

⚠️ Forex spot không có volume chính thức. Dùng tick volume hoặc futures volume từ CME.` },

  "2-1-8": { title: "ADX — Sức mạnh xu hướng", content: `### ADX là gì?
**Average Directional Index** đo **sức mạnh** xu hướng (KHÔNG phải hướng).

### Cấu tạo
- **+DI:** Positive Directional Indicator (lực mua)
- **-DI:** Negative Directional Indicator (lực bán)
- **ADX:** Trung bình sức mạnh xu hướng

### Đọc ADX
| ADX Value | Ý nghĩa |
|-----------|--------|
| < 20 | Không có trend / Sideways |
| 20 - 25 | Trend bắt đầu hình thành |
| 25 - 50 | Trend mạnh |
| 50 - 75 | Trend rất mạnh |
| > 75 | Cực kỳ mạnh (hiếm gặp) |

### Tín hiệu giao dịch
- **+DI > -DI:** Lực mua mạnh hơn → Bullish
- **-DI > +DI:** Lực bán mạnh hơn → Bearish
- **DI Crossover + ADX > 25:** Tín hiệu mạnh

### Ứng dụng thực chiến
- ADX < 20 → Dùng **Mean Reversion** strategy (Bollinger, RSI)
- ADX > 25 → Dùng **Trend Following** strategy (MA, breakout)
- ADX đang tăng → Trend đang mạnh lên, giữ lệnh
- ADX đang giảm → Trend yếu đi, chuẩn bị exit` },

  "2-2-0": { title: "Top-Down Analysis", content: `### Top-Down Analysis là gì?
Phân tích từ **TF lớn xuống TF nhỏ** để có bức tranh toàn cảnh.

### Quy trình 3 bước

**Bước 1 — TF lớn (Monthly/Weekly/Daily):**
- Xác định **xu hướng chính** (major trend)
- Xác định **vùng S/R quan trọng**
- Đây là "câu chuyện lớn" của thị trường

**Bước 2 — TF trung (H4/H1):**
- Xác định **xu hướng phụ** trong trend chính
- Tìm **vùng entry tiềm năng** (OB, FVG, Fib)
- Xem giá đang ở đâu trong bức tranh lớn

**Bước 3 — TF nhỏ (M15/M5):**
- Tìm **trigger entry** chính xác
- Price action confirmation (engulfing, pin bar)
- Đặt SL/TP chính xác

### Ví dụ thực tế
- D1: EUR/USD uptrend, giá pullback về EMA 50
- H4: Giá đang tại vùng demand zone
- M15: Bullish engulfing tại demand → Entry Buy
- SL: Dưới demand zone, TP: Swing high D1

⚠️ **KHÔNG BAO GIỜ** trade ngược xu hướng TF lớn khi mới bắt đầu.` },

  "2-2-1": { title: "Entry trên TF nhỏ", content: `### Xác định xu hướng TF lớn, Entry TF nhỏ

### Quy tắc cốt lõi
- TF lớn cho **hướng trade** (bias)
- TF nhỏ cho **điểm vào lệnh** (entry)
- Luôn trade **cùng chiều** TF lớn

### Combo TF phổ biến
| Phong cách | TF Trend | TF Entry |
|-----------|----------|----------|
| Scalping | H1 | M1-M5 |
| Day Trading | H4-D1 | M15-H1 |
| Swing | D1-W1 | H4-D1 |

### Kỹ thuật Entry trên TF nhỏ

**1. Break of Structure (BOS):**
- Chờ BOS trên TF nhỏ cùng chiều TF lớn
- Entry sau khi giá retest vùng BOS

**2. Engulfing/Pin Bar tại key level:**
- TF lớn xác định vùng S/R/OB
- TF nhỏ chờ nến xác nhận tại vùng đó

**3. Divergence trên TF nhỏ:**
- RSI divergence trên M15/H1 tại vùng S/R TF lớn
- Xác nhận momentum đang đổi chiều` },

  "2-2-2": { title: "Confluence Zone", content: `### Confluence là gì?
Khi **nhiều yếu tố kỹ thuật trùng nhau** tại cùng một vùng giá → Tín hiệu mạnh hơn.

### Các yếu tố tạo Confluence
- Support/Resistance zone
- Fibonacci retracement level
- Moving Average (EMA 50, 200)
- Trendline
- Order Block / FVG
- Round numbers (1.0800, 1.0900...)

### Ví dụ Confluence mạnh
- Fib 61.8% **+** EMA 50 **+** S/R zone → **3 yếu tố** → Very strong
- Order Block **+** FVG **+** Fib 50% → **SMC confluence** → High probability

### Quy tắc
- Tối thiểu **2 yếu tố** trùng nhau mới nên entry
- **3+ yếu tố** = High probability setup
- Confluence trên **TF lớn** mạnh hơn TF nhỏ
- Không phải mọi confluence đều giống nhau — S/R + Fib mạnh hơn 2 indicator trùng nhau` },

  "2-2-3": { title: "Fractal Market Theory", content: `### Fractal Market Theory

Thị trường có tính **tự tương tự (fractal)** — cấu trúc trên TF lớn lặp lại trên TF nhỏ.

### Ý nghĩa thực tế
- Mô hình H&S trên D1 cũng xuất hiện trên M15
- Cấu trúc HH/HL trên W1 lặp lại trên H1
- Support/Resistance hoạt động giống nhau mọi TF

### Ứng dụng
- **Xác nhận setup:** Pattern trên TF lớn + pattern trên TF nhỏ → Mạnh hơn
- **Multi-TF analysis:** Cùng pattern trên nhiều TF = probability cao
- **Nesting:** TF nhỏ nằm trong structure TF lớn

### Bill Williams Fractals
- **Fractal High:** Nến có high cao hơn 2 nến trước và 2 nến sau
- **Fractal Low:** Nến có low thấp hơn 2 nến trước và 2 nến sau
- Dùng để xác định swing points tự động` },

  "3-0-2": { title: "Lãi suất & NHTW", content: `### Vai trò của Ngân hàng Trung ương
NHTW kiểm soát **lãi suất** — yếu tố quan trọng NHẤT ảnh hưởng đến tỷ giá.

### Các NHTW quan trọng
| NHTW | Tiền tệ | Đặc điểm |
|------|---------|--------|
| **FED** | USD | Quan trọng nhất thế giới |
| **ECB** | EUR | Dovish truyền thống |
| **BOE** | GBP | Hawkish hơn ECB |
| **BOJ** | JPY | Ultra-dovish, can thiệp |
| **RBA** | AUD | Theo commodity cycle |
| **RBNZ** | NZD | Hawkish nhỏ |
| **BOC** | CAD | Theo giá dầu |
| **SNB** | CHF | Can thiệp FX thường xuyên |

### Tác động lãi suất
- **Tăng lãi suất (Hawkish):** Đồng tiền TĂNG giá
- **Giảm lãi suất (Dovish):** Đồng tiền GIẢM giá
- **Giữ nguyên:** Phụ thuộc kỳ vọng thị trường

### Interest Rate Differential
Chênh lệch lãi suất giữa 2 nước → Driver chính của tỷ giá dài hạn.

Ví dụ: Lãi suất US 5%, EU 3% → USD mạnh hơn EUR (dòng vốn chảy về US)` },

  "3-0-3": { title: "Forward Guidance & Dot Plot", content: `### Forward Guidance
NHTW **gợi ý** về chính sách tương lai để định hướng kỳ vọng thị trường.

**Các loại Forward Guidance:**
- **Calendar-based:** "Giữ lãi suất đến Q2 2025"
- **Data-dependent:** "Sẽ điều chỉnh theo dữ liệu lạm phát"
- **Open-ended:** "Sẵn sàng hành động khi cần"

### Dot Plot (FED)
- Biểu đồ chấm thể hiện dự báo lãi suất của **mỗi thành viên FOMC**
- Công bố 4 lần/năm cùng SEP (Summary of Economic Projections)
- **Median dot** = dự báo trung vị → Thị trường focus vào đây

### Cách đọc thị trường
- Forward Guidance hawkish hơn kỳ vọng → Đồng tiền tăng
- Forward Guidance dovish hơn kỳ vọng → Đồng tiền giảm
- Dot Plot shift up → USD tăng; Shift down → USD giảm

### Fed Funds Futures
Dùng CME FedWatch Tool để xem xác suất thay đổi lãi suất mà thị trường đang price in.` },

  "3-0-4": { title: "PMI, ISM, ZEW", content: `### PMI — Purchasing Managers Index
Chỉ số đo hoạt động kinh doanh từ khảo sát quản lý mua hàng.

| Giá trị | Ý nghĩa |
|---------|--------|
| > 50 | Kinh tế MỞ RỘNG |
| = 50 | Không đổi |
| < 50 | Kinh tế THU HẸP |

**PMI Manufacturing:** Sản xuất — leading indicator
**PMI Services:** Dịch vụ — chiếm tỷ trọng lớn GDP
**PMI Composite:** Kết hợp cả hai

### ISM (Institute for Supply Management)
- Phiên bản PMI của Mỹ
- ISM Manufacturing và ISM Services
- Cực kỳ quan trọng cho USD

### ZEW (Zentrum für Europäische Wirtschaftsforschung)
- Chỉ số kỳ vọng kinh tế Đức
- Khảo sát nhà phân tích và đầu tư
- Leading indicator cho EUR

### Cách trade
- PMI > 50 và tăng → Positive cho đồng tiền
- PMI < 50 và giảm → Negative
- **Surprise factor** (Actual vs Forecast) quan trọng hơn giá trị tuyệt đối` },

  "3-0-5": { title: "Retail Sales & Housing", content: `### Retail Sales
Đo tổng doanh số bán lẻ — phản ánh **sức tiêu dùng** (chiếm ~70% GDP Mỹ).

- **Core Retail Sales:** Loại bỏ auto → Ổn định hơn
- Retail Sales tăng → Kinh tế mạnh → Đồng tiền tăng
- Retail Sales giảm → Kinh tế yếu → Đồng tiền giảm

### Consumer Confidence
- **Conference Board (US):** Đo lòng tin người tiêu dùng
- **Michigan Sentiment:** Khảo sát Uni of Michigan
- Confidence cao → Tiêu dùng tăng → GDP tăng

### Housing Data (Mỹ)
| Chỉ số | Ý nghĩa |
|--------|--------|
| Building Permits | Số giấy phép xây mới (leading) |
| Housing Starts | Số nhà bắt đầu xây |
| Existing Home Sales | Doanh số nhà cũ |
| New Home Sales | Doanh số nhà mới |
| Case-Shiller | Chỉ số giá nhà |

Housing mạnh → Kinh tế mạnh → Hỗ trợ đồng tiền` },

  "3-0-6": { title: "Trade Balance & Current Account", content: `### Trade Balance (Cán cân thương mại)
Xuất khẩu - Nhập khẩu = Trade Balance

- **Thặng dư (Surplus):** Xuất > Nhập → Demand cho đồng tiền tăng
- **Thâm hụt (Deficit):** Nhập > Xuất → Supply đồng tiền tăng

### Tác động đến tỷ giá
- Thặng dư thương mại → Đồng tiền có xu hướng TĂNG
- Thâm hụt thương mại → Đồng tiền có xu hướng GIẢM
- Nhưng tác động **dài hạn**, không phải ngay lập tức

### Current Account (Tài khoản vãng lai)
Bao gồm: Trade Balance + Services + Income + Transfers

- Current Account thâm hụt lớn → Đồng tiền dễ mất giá dài hạn
- Ví dụ: Mỹ thâm hụt liên tục nhưng USD vẫn mạnh nhờ dòng vốn đầu tư

### Capital Flow
Dòng vốn đầu tư (FDI, Portfolio) có thể **bù đắp** thâm hụt thương mại.
- Nước có lãi suất cao, tăng trưởng tốt → Thu hút vốn → Đồng tiền mạnh` },

  "3-0-7": { title: "Yield Curve", content: `### Yield Curve là gì?
Đường cong lợi suất thể hiện lãi suất trái phiếu chính phủ ở các kỳ hạn khác nhau.

### 3 dạng Yield Curve

**1. Normal (Bình thường):**
- Kỳ hạn dài > Kỳ hạn ngắn
- Kinh tế khỏe mạnh, tăng trưởng

**2. Inverted (Đảo ngược):**
- Kỳ hạn ngắn > Kỳ hạn dài
- **Báo hiệu suy thoái** — Chính xác ~85% trong lịch sử

**3. Flat (Phẳng):**
- Kỳ hạn dài ≈ Kỳ hạn ngắn
- Giai đoạn chuyển tiếp, bất ổn

### 2Y-10Y Spread
- US 10Y yield - US 2Y yield
- Spread dương → Normal → Kinh tế tốt
- Spread âm → Inverted → Cảnh báo suy thoái

### Tác động đến Forex
- Yield tăng → Đồng tiền tăng (thu hút vốn)
- Yield differential giữa 2 nước → Driver tỷ giá
- US 10Y tăng mạnh → USD tăng, JPY giảm` },

  "3-1-0": { title: "Tương quan liên thị trường", content: `### Tương quan USD

| Tương quan | Giải thích |
|-----------|----------|
| USD ↑ = Gold ↓ | Gold được định giá bằng USD |
| USD ↑ = Oil ↓ | Oil giao dịch bằng USD |
| AUD ↑ = Commodities ↑ | Úc xuất khẩu quặng sắt |
| CAD ↑ = Oil ↑ | Canada xuất khẩu dầu |
| NZD ↑ = Dairy ↑ | NZ xuất khẩu sữa |

### Mối quan hệ Risk On/Risk Off

**Risk On (Thị trường lạc quan):**
- AUD, NZD, GBP, EUR tăng
- JPY, CHF, USD giảm
- Stock markets tăng

**Risk Off (Thị trường lo ngại):**
- JPY, CHF, USD (safe haven) tăng
- AUD, NZD, GBP giảm
- Gold tăng, Stock giảm

### Ứng dụng
- Nếu Oil tăng mạnh → Kiểm tra buy CAD
- Nếu Gold tăng → USD có thể yếu → Sell USD
- Stock markets sụp → Buy JPY (safe haven)` },

  "3-1-1": { title: "Bond Yields & Currency", content: `### Bond Yields và Tiền tệ

Lợi suất trái phiếu là **driver quan trọng nhất** của tỷ giá trung-dài hạn.

### Cơ chế
- Yield tăng → Thu hút vốn đầu tư → Demand tiền tệ tăng → Đồng tiền tăng
- Yield giảm → Vốn rút ra → Đồng tiền giảm

### US 10-Year Yield
- Benchmark lãi suất quan trọng nhất thế giới
- US 10Y tăng → USD mạnh, đặc biệt vs JPY
- Tương quan rất cao với USD/JPY

### 2Y-10Y Spread
- Phản ánh kỳ vọng kinh tế
- Spread mở rộng → Kỳ vọng tăng trưởng → Risk on
- Spread thu hẹp/âm → Lo ngại suy thoái → Risk off

### Real Yield
Real Yield = Nominal Yield - Inflation Expectation
- Real Yield tăng → Đồng tiền tăng mạnh hơn
- Real Yield âm → Tiền mất giá thực tế` },

  "3-1-2": { title: "Equity & Risk Sentiment", content: `### S&P 500 và Forex
- S&P 500 tăng → Risk On → AUD, NZD tăng; JPY giảm
- S&P 500 giảm → Risk Off → JPY, CHF tăng; AUD giảm

### VIX — Fear Index
Đo kỳ vọng biến động 30 ngày tới của S&P 500.

| VIX | Ý nghĩa |
|-----|--------|
| < 15 | Rất bình tĩnh |
| 15-20 | Bình thường |
| 20-30 | Lo ngại |
| > 30 | Hoảng loạn |

- VIX tăng mạnh → JPY, CHF tăng (safe haven)
- VIX giảm → Risk on → Commodity currencies tăng

### Tương quan chéo
- Nikkei 225 tương quan NGƯỢC với JPY (Nikkei lên = JPY xuống)
- FTSE 100 tương quan với GBP
- DAX tương quan với EUR` },

  "3-1-3": { title: "Commodity Currencies", content: `### Commodity Currencies là gì?
Đồng tiền của quốc gia phụ thuộc nhiều vào xuất khẩu nguyên liệu.

### 3 Commodity Currencies chính

**AUD (Dollar Úc):**
- Driver chính: Giá quặng sắt, than
- Tương quan mạnh với kinh tế Trung Quốc (khách hàng lớn nhất)
- Nhạy cảm với risk sentiment

**NZD (Dollar New Zealand):**
- Driver chính: Giá sữa (GDT Dairy Auction)
- Kinh tế nhỏ, biến động mạnh
- Tương quan cao với AUD

**CAD (Dollar Canada):**
- Driver chính: Giá dầu WTI
- Tương quan ngược USD/CAD và Oil
- Oil tăng → USD/CAD giảm (CAD mạnh)

### Cách trade
- Theo dõi giá commodity liên quan
- Oil breakout ↑ → Sell USD/CAD
- Iron ore giảm mạnh → Sell AUD/USD
- Kết hợp fundamental + technical analysis` },

  "3-1-4": { title: "Dollar Index (DXY)", content: `### DXY là gì?
**Dollar Index** đo sức mạnh USD so với rổ 6 đồng tiền chính.

### Cấu trúc DXY
| Đồng tiền | Tỷ trọng |
|-----------|----------|
| **EUR** | 57.6% |
| JPY | 13.6% |
| GBP | 11.9% |
| CAD | 9.1% |
| SEK | 4.2% |
| CHF | 3.6% |

⚠️ EUR chiếm gần 58% → DXY phản ánh EUR/USD rất nhiều.

### Cách sử dụng DXY
- **DXY tăng** → USD mạnh → EUR/USD, GBP/USD giảm
- **DXY giảm** → USD yếu → EUR/USD, GBP/USD tăng
- Xem DXY như **GPS** cho tất cả cặp USD

### DXY và Trading
- Trước khi trade cặp USD → Check xu hướng DXY
- DXY tại S/R quan trọng → Cặp USD có thể đảo chiều
- DXY breakout → Move mạnh trên nhiều cặp USD` },

  "3-1-5": { title: "COT Report", content: `### COT Report là gì?
**Commitment of Traders** — báo cáo vị thế của các nhóm trader lớn trên futures market.

Công bố: Mỗi thứ 6 bởi CFTC (data thứ 3 trước đó)

### 3 nhóm trader
| Nhóm | Ai | Ý nghĩa |
|------|---|--------|
| **Commercials** | Hedgers (ngân hàng, công ty) | Smart Money |
| **Non-Commercials** | Quỹ đầu tư, speculators | Trend followers |
| **Non-Reportable** | Retail traders | Thường sai |

### Cách đọc COT
- **Non-Commercials net long extreme** → Cặp tiền có thể đã đỉnh
- **Non-Commercials net short extreme** → Cặp tiền có thể đã đáy
- So sánh với **lịch sử** — vị thế cực đoan so với 3 năm

### Ứng dụng
- COT là **leading indicator** cho trend dài hạn
- Không dùng cho short-term trading
- Kết hợp với technical analysis cho timing` },

  "3-2-0": { title: "Retail Sentiment", content: `### Retail Sentiment Indicators
Đo vị thế long/short của retail trader.

### Công cụ phổ biến
- **IG Client Sentiment:** Từ IG broker
- **Myfxbook Community Outlook:** Tổng hợp nhiều broker
- **DailyFX Sentiment:** Từ FXCM

### Cách sử dụng — Contrarian Approach
- Retail thường **sai** ở các turning point
- **Đa số retail long** → Giá có thể giảm
- **Đa số retail short** → Giá có thể tăng

### Ví dụ
- 75% retail long EUR/USD → Bearish signal
- 80% retail short GBP/USD → Bullish signal

⚠️ Sentiment chỉ là **1 yếu tố**, không trade một mình. Kết hợp với technical + fundamental.` },

  "3-2-1": { title: "Fear & Greed Index", content: `### Fear & Greed Index
Đo **tâm lý tổng thể** của thị trường trên thang 0-100.

| Giá trị | Tâm lý |
|---------|--------|
| 0-25 | Extreme Fear → Cơ hội mua? |
| 25-45 | Fear |
| 45-55 | Neutral |
| 55-75 | Greed |
| 75-100 | Extreme Greed → Cơ hội bán? |

### VIX trong Forex
- VIX > 30 → Safe haven currencies (JPY, CHF) mạnh
- VIX < 15 → Risk on → AUD, NZD, EM currencies mạnh

### Ứng dụng Contrarian
- Warren Buffett: "Be fearful when others are greedy, greedy when others are fearful"
- Extreme Fear thường là đáy
- Extreme Greed thường là đỉnh` },

  "3-2-2": { title: "News Sentiment", content: `### News Sentiment & Phản ứng thị trường

### 3 giai đoạn phản ứng tin
1. **Trước tin (Pre-news):** Thị trường price in kỳ vọng → Spread mở rộng
2. **Khi tin ra (Spike):** Phản ứng tức thì → Whipsaw
3. **Sau tin (Post-news):** Thị trường tiêu hóa → Trend thật bắt đầu

### Quy tắc trade tin
- **Buy the rumor, sell the fact:** Thị trường đã price in → khi tin ra, đảo chiều
- Chờ **15-30 phút** sau tin để tránh whipsaw
- Giảm lot size khi trade tin

### Tin tức quan trọng theo cấp độ
- **Cấp 1 (Rất mạnh):** FOMC, NFP, CPI, ECB Rate
- **Cấp 2 (Mạnh):** GDP, PMI, Retail Sales
- **Cấp 3 (Trung bình):** Trade Balance, PPI

⚠️ Trader mới: **KHÔNG trade tin**. Đóng lệnh trước tin lớn để bảo vệ vốn.` },

  "3-2-3": { title: "Positioning Data", content: `### COT & Options Open Interest

### Options OI trong Forex
- **Open Interest** tại các strike price cho thấy vùng giá quan trọng
- Strike price có OI lớn → Hoạt động như S/R
- Options expiry date → Giá có thể bị "pin" tại max pain

### 25-Delta Risk Reversal
- Đo chênh lệch giữa call và put options
- Positive → Bullish bias
- Negative → Bearish bias
- Extreme readings → Possible reversal

### Positioning Extremes
- Khi vị thế long/short đạt extreme → Mean reversion likely
- Dùng COT + Options data để xác định extreme

### Contrarian Signal
- Khi tất cả đều bullish → Ai sẽ mua tiếp?
- Khi tất cả đều bearish → Ai sẽ bán tiếp?
- Extreme positioning = fuel cạn kiệt cho xu hướng` },

  "3-2-4": { title: "Contrarian Trading", content: `### Contrarian Trading — Đi ngược đám đông

### Khi nào đi ngược?
- **Sentiment extreme:** 80%+ retail long/short
- **COT extreme:** Vị thế speculator cực đoan
- **VIX extreme:** Fear/Greed cực đoan
- **Kết hợp technical:** Divergence, pattern đảo chiều

### Khi nào KHÔNG đi ngược?
- Trend mới bắt đầu → Đi ngược sớm = thua
- Không có technical confirmation
- Chỉ vì "giá đã tăng/giảm nhiều"

### Quy trình
1. Xác nhận sentiment extreme
2. Tìm technical reversal signal
3. Chờ price action confirmation
4. Entry với SL chặt, RR tốt

⚠️ Contrarian trading rủi ro cao. Cần **nhiều xác nhận** trước khi entry.` },

  "4-0-2": { title: "Liquidity", content: `### Liquidity trong SMC là gì?
Liquidity = **tập hợp các lệnh Stop Loss** của trader tại các vùng giá rõ ràng.

### 2 loại Liquidity

**Buy-side Liquidity (BSL):**
- SL của short sellers + Buy stops = Nằm TRÊN highs/resistance
- Smart Money đẩy giá lên "quét" BSL trước khi giảm

**Sell-side Liquidity (SSL):**
- SL của long buyers + Sell stops = Nằm DƯỚI lows/support
- Smart Money đẩy giá xuống "quét" SSL trước khi tăng

### Liquidity Sweep/Grab
- Giá vượt qua high/low → Quét SL → Quay đầu ngay
- Là dấu hiệu **Smart Money đang vào vị thế**

### Cách trade Liquidity
1. Xác định vùng liquidity (highs/lows rõ ràng)
2. Chờ giá sweep liquidity
3. Tìm reversal confirmation (CHoCH, engulfing)
4. Entry ngược với SL ngoài sweep point

⚠️ Đừng đặt SL tại swing high/low rõ ràng — Smart Money sẽ quét!` },

  "4-0-3": { title: "🔑 BOS & CHoCH", content: `### Break of Structure (BOS)
Giá phá vỡ **swing high/low** gần nhất theo chiều trend → **Trend tiếp tục**.

- Uptrend: Giá phá LÊN trên swing high → BOS bullish
- Downtrend: Giá phá XUỐNG dưới swing low → BOS bearish

### Change of Character (CHoCH)
Giá phá vỡ swing high/low **ngược chiều trend** → **Tín hiệu đảo chiều đầu tiên**.

- Uptrend → Giá phá XUỐNG swing low → CHoCH bearish
- Downtrend → Giá phá LÊN swing high → CHoCH bullish

### So sánh BOS vs CHoCH
| Tín hiệu | Ý nghĩa | Hành động |
|----------|---------|----------|
| BOS | Trend tiếp tục | Trade theo trend |
| CHoCH | Có thể đảo chiều | Cảnh giác, chờ xác nhận |

### Quy tắc xác nhận
- Dùng nến **đóng cửa** (close), không phải wick
- CHoCH + BOS ngược chiều = Xác nhận đảo chiều
- CHoCH trên TF lớn > CHoCH trên TF nhỏ` },

  "4-0-4": { title: "Market Structure Shift", content: `### MSS — Market Structure Shift
Khi cấu trúc thị trường thay đổi hoàn toàn từ bullish → bearish (hoặc ngược lại).

### Quy trình MSS
1. **CHoCH:** Tín hiệu đầu tiên
2. **BOS ngược:** Xác nhận CHoCH
3. **Higher TF confirmation:** MSS trên TF lớn

### Cách trade MSS
1. Xác định CHoCH trên H4/D1
2. Chờ pullback về Order Block hoặc FVG
3. Tìm entry trên TF nhỏ (M15)
4. SL ngoài swing point, TP tại vùng liquidity tiếp theo

### Ví dụ MSS Bearish
- Uptrend: HH → HL → HH → HL
- CHoCH: Giá phá xuống HL gần nhất
- BOS bearish: Giá tạo Lower Low mới
- → Structure đã shift sang bearish
- → Tìm sell opportunity` },

  "4-0-5": { title: "Inducement & Trap", content: `### Inducement là gì?
Smart Money tạo ra **tín hiệu giả** để dụ retail trader vào lệnh sai.

### Các dạng Inducement phổ biến

**1. False Breakout:**
- Giá phá vỡ S/R → Retail entry theo breakout → Giá quay đầu
- Smart Money quét SL + vào vị thế ngược

**2. Stop Hunt:**
- Đẩy giá đến vùng có nhiều SL
- Quét SL → Tạo thanh khoản → Đảo chiều

**3. Equal Highs/Lows:**
- 2-3 đỉnh/đáy bằng nhau → Tập trung SL
- Smart Money sẽ quét qua trước khi đảo chiều

### Cách tránh bị trap
- Không đặt SL tại vùng rõ ràng
- Chờ sweep xong mới entry
- Trade theo Smart Money, không theo breakout đầu tiên` },

  "4-0-6": { title: "Optimal Trade Entry (OTE)", content: `### OTE — ICT Optimal Trade Entry
Vùng entry lý tưởng trong SMC/ICT, kết hợp Fibonacci + OB + FVG.

### Vùng OTE
- Nằm giữa **Fib 62%-79%** của impulse move
- Thường trùng với Order Block và/hoặc FVG
- Là vùng Smart Money thường entry lại

### Cách tìm OTE
1. Xác định impulse move (BOS)
2. Kéo Fibonacci từ swing low → swing high (buy) hoặc ngược lại
3. Vùng 62%-79% = OTE zone
4. Tìm OB hoặc FVG trong vùng OTE → Confluence mạnh

### Entry tại OTE
- Chờ giá pullback về OTE zone
- Tìm confirmation trên TF nhỏ (bullish/bearish engulfing)
- SL dưới/trên OTE zone
- TP tại swing high/low hoặc liquidity pool` },

  "4-0-7": { title: "ICT Killzones", content: `### ICT Killzones — Khung giờ vàng

Khung giờ mà Smart Money hoạt động mạnh nhất.

### Các Killzone (GMT)
| Killzone | Giờ GMT | Giờ VN | Đặc điểm |
|----------|---------|--------|--------|
| **Asian** | 00:00-05:00 | 07:00-12:00 | Range, tạo liquidity |
| **London Open** | 07:00-10:00 | 14:00-17:00 | Breakout, trend bắt đầu |
| **NY Open** | 12:00-15:00 | 19:00-22:00 | Continuation hoặc reversal |
| **London Close** | 15:00-17:00 | 22:00-00:00 | Reversal, profit taking |

### Cách trade Killzones
- **London Open:** Trade breakout khỏi Asian range
- **NY Open:** Trade continuation hoặc reversal London move
- **London Close:** Chốt lời, ít entry mới

### Quy tắc
- Chỉ trade trong Killzones → Chất lượng entry tốt hơn
- Asian session tạo liquidity → London/NY quét liquidity` },

  "4-0-8": { title: "ICT Power of Three: AMD", content: `### Power of Three — AMD Model

**A**ccumulation → **M**anipulation → **D**istribution

### 3 giai đoạn

**1. Accumulation (Tích lũy):**
- Smart Money âm thầm mua/bán
- Giá đi ngang, range nhỏ
- Thường xảy ra trong Asian session

**2. Manipulation (Thao túng):**
- Smart Money đẩy giá **ngược hướng** thật
- Quét stop loss, tạo FOMO cho retail
- False breakout, liquidity sweep

**3. Distribution (Phân phối):**
- Smart Money trade theo hướng thật
- Trend mạnh bắt đầu
- Retail bị trap ở phía sai

### Ứng dụng Daily AMD
- Asian session = Accumulation
- London Open = Manipulation (quét high/low Asian)
- London/NY session = Distribution (trend thật)` },

  "4-0-9": { title: "Wyckoff Method", content: `### Wyckoff — Đọc vị Smart Money

Richard Wyckoff phát triển lý thuyết phân tích hành vi Smart Money qua supply/demand.

### 4 giai đoạn Wyckoff

**1. Accumulation:**
- Smart Money mua dần ở đáy
- Giá range, volume giảm
- Spring: False breakdown → Test đáy → Tín hiệu mua

**2. Markup:**
- Giá tăng mạnh
- Higher highs, higher lows
- Volume tăng theo trend

**3. Distribution:**
- Smart Money bán dần ở đỉnh
- Giá range, volume giảm
- Upthrust: False breakout → Test đỉnh → Tín hiệu bán

**4. Markdown:**
- Giá giảm mạnh
- Lower highs, lower lows

### Key Events
- **Spring (Accumulation):** False breakdown dưới support → Buy signal
- **Upthrust (Distribution):** False breakout trên resistance → Sell signal
- Volume analysis rất quan trọng trong Wyckoff` },

  "4-1-0": { title: "Scalping", content: `### Scalping — Giao dịch siêu ngắn hạn

| Đặc điểm | Chi tiết |
|----------|--------|
| Timeframe | M1-M5 |
| Thời gian giữ lệnh | Vài giây đến vài phút |
| Target | 1-15 pips |
| Số lệnh/ngày | 10-50+ |

### Yêu cầu
- Spread **cực thấp** (ECN account)
- Execution **nhanh** (< 50ms)
- Kỷ luật **tuyệt đối**
- Tập trung cao trong suốt phiên

### Chiến lược Scalping phổ biến
- **EMA Cross:** EMA 9 x EMA 21 trên M1
- **S/R Bounce:** Scalp tại micro S/R
- **Breakout Scalp:** Trade breakout micro range

### Cặp tiền phù hợp
EUR/USD, GBP/USD, USD/JPY — spread thấp, thanh khoản cao

⚠️ Scalping KHÔNG phù hợp cho người mới. Cần kinh nghiệm, tâm lý vững, và chi phí giao dịch thấp.` },

  "4-1-1": { title: "Day Trading", content: `### Day Trading — Trong ngày

| Đặc điểm | Chi tiết |
|----------|--------|
| Timeframe | M15-H1 |
| Thời gian giữ | Vài giờ, đóng trong ngày |
| Target | 20-100 pips |
| Số lệnh/ngày | 1-5 |

### Quy tắc Day Trading
- **Không giữ lệnh qua đêm** → Tránh gap, swap
- Phân tích buổi sáng → Trade phiên London + NY
- Maximum 2-3 lệnh cùng lúc

### Phong cách phổ biến
- **Trend Day:** Trade theo trend intraday
- **Reversal:** Trade đảo chiều tại key level
- **News Day:** Trade sau tin lớn

### Ưu/Nhược điểm
- Ưu: Không lo qua đêm, nhiều cơ hội
- Nhược: Cần thời gian theo dõi, tâm lý áp lực` },

  "4-1-2": { title: "Swing Trading", content: `### Swing Trading — Trung hạn

| Đặc điểm | Chi tiết |
|----------|--------|
| Timeframe | H4-Daily |
| Thời gian giữ | 2-10 ngày |
| Target | 100-500 pips |
| Số lệnh/tuần | 1-5 |

### Tại sao Swing Trading tốt cho người mới?
- Ít thời gian screen time
- Ít nhiễu (noise) hơn TF nhỏ
- RR ratio tốt hơn
- Swap cost chấp nhận được

### Quy trình Swing Trading
1. D1: Xác định trend chính + key levels
2. H4: Tìm setup (pullback, pattern)
3. Entry khi có confirmation
4. SL dưới swing low/high, TP tại next key level

### Chiến lược phổ biến
- **Pullback to MA:** Trade pullback về EMA 20/50 trong trend
- **S/R Flip:** Trade retest sau breakout
- **Pattern Trading:** H&S, Triangle trên H4/D1` },

  "4-1-3": { title: "Position Trading", content: `### Position Trading — Dài hạn

| Đặc điểm | Chi tiết |
|----------|--------|
| Timeframe | Weekly-Monthly |
| Thời gian giữ | Vài tuần đến vài tháng |
| Target | 500-2000+ pips |
| Số lệnh/tháng | 1-3 |

### Yêu cầu
- Hiểu **fundamental analysis** sâu
- Vốn lớn, chịu được drawdown lớn
- Kiên nhẫn cao
- Quan tâm swap cost

### Driver chính
- Chính sách tiền tệ (lãi suất)
- Xu hướng kinh tế vĩ mô
- Dòng vốn quốc tế

### Ưu/Nhược
- Ưu: Ít thời gian, big picture, target lớn
- Nhược: Vốn lớn, swap, drawdown sâu, đòi hỏi kiên nhẫn` },

  "4-1-4": { title: "News Trading", content: `### News Trading — Giao dịch tin tức

### Chiến lược

**1. Straddle (Trước tin):**
- Đặt Buy Stop trên + Sell Stop dưới range
- Tin ra → 1 lệnh kích hoạt, 1 lệnh hủy
- Rủi ro: Slippage, whipsaw

**2. Fade the Move (Sau tin):**
- Chờ spike ban đầu
- Trade đảo chiều khi giá quay về
- Phù hợp khi tin không quá surprise

**3. Post-News Pullback:**
- Chờ trend hình thành sau tin (15-30 phút)
- Trade pullback theo hướng trend mới
- An toàn nhất trong 3 cách

### Quy tắc an toàn
- Giảm lot size 50%
- Mở rộng SL (spread rộng hơn bình thường)
- Chỉ trade tin **high impact**
- Mới bắt đầu: Tốt nhất là **KHÔNG TRADE TIN**` },

  "4-1-5": { title: "Breakout Trading", content: `### Breakout Trading

### Các loại Breakout

**1. Volatility Breakout:**
- Bollinger Squeeze → Expansion
- ATR thấp → đột ngột tăng

**2. Range Breakout:**
- Giá phá vỡ range/consolidation
- Xác nhận bằng volume tăng

**3. London Breakout:**
- Breakout khỏi Asian session range
- Phiên London bắt đầu → Volume tăng đột biến

### Cách trade Breakout
1. Xác định range/consolidation
2. Đặt Buy Stop trên resistance + Sell Stop dưới support
3. SL: Giữa range
4. TP: Width of range projected

### Tránh False Breakout
- Chờ nến **đóng cửa** ngoài range
- Volume phải tăng khi breakout
- Retest sau breakout → Entry an toàn hơn` },

  "4-1-6": { title: "Mean Reversion", content: `### Mean Reversion — Quay về trung bình

### Concept
Giá luôn có xu hướng quay về giá trị trung bình (mean) sau khi đi quá xa.

### Indicators cho Mean Reversion
- **Bollinger Bands:** Giá chạm band → Quay về middle
- **RSI Extreme:** RSI > 80 hoặc < 20
- **Keltner Channel:** Giá ngoài channel

### Khi nào dùng Mean Reversion?
- **Range market** (ADX < 20)
- Giá tại **extreme level** + reversal signal

### Khi nào KHÔNG dùng?
- **Trending market** (ADX > 25)
- Walking the band → Giá sẽ KHÔNG revert

### Setup
1. ADX < 20 (xác nhận range)
2. Giá chạm Bollinger Band + RSI extreme
3. Reversal candle (pin bar, engulfing)
4. Entry, TP tại middle band/MA, SL ngoài band` },

  "4-1-7": { title: "Trend Following", content: `### Trend Following — Theo xu hướng

### Nguyên tắc
"The trend is your friend" — Trade cùng chiều xu hướng.

### Chiến lược

**1. MA Crossover:**
- EMA 20 cắt lên EMA 50 → Buy
- EMA 20 cắt xuống EMA 50 → Sell
- Filter: ADX > 25

**2. Donchian Channel:**
- Giá break high 20 kỳ → Buy
- Giá break low 20 kỳ → Sell

**3. ADX + DI Crossover:**
- +DI > -DI + ADX > 25 → Buy
- -DI > +DI + ADX > 25 → Sell

### Quản lý lệnh
- **Trailing Stop:** Di chuyển SL theo trend
- **Partial TP:** Chốt 50% tại 1:1, để 50% chạy
- **Exit:** Khi ADX giảm hoặc MA cross ngược` },

  "4-2-0": { title: "Backtest & Edge", content: `### Backtest — Kiểm tra chiến lược

### Quy trình Backtest
1. **Xác định rules** rõ ràng (entry, exit, SL, TP)
2. **Chọn data:** Tối thiểu 1 năm, nhiều market conditions
3. **Test từng lệnh:** Ghi chép kết quả
4. **Tính metrics:** Win rate, RR, Profit Factor, Max DD

### Metrics quan trọng
| Metric | Ý nghĩa | Tốt |
|--------|---------|-----|
| Win Rate | % lệnh thắng | > 40% (nếu RR tốt) |
| Avg RR | Trung bình Risk:Reward | > 1:2 |
| Profit Factor | Gross Profit / Gross Loss | > 1.5 |
| Max Drawdown | Lỗ lớn nhất từ peak | < 20% |
| Expectancy | Trung bình lợi nhuận/lệnh | > 0 |

### Expectancy Formula
Expectancy = (Win% × Avg Win) - (Loss% × Avg Loss)

Expectancy > 0 → Hệ thống có **edge** (lợi thế)

⚠️ Backtest trên demo TRƯỚC KHI trade real money.` },

  "4-2-1": { title: "Entry Rules", content: `### Entry Rules — Quy tắc vào lệnh

### Cấu trúc Entry

**1. Trigger (Kích hoạt):**
- Điều kiện chính: Pattern, signal, indicator
- Ví dụ: Bullish engulfing tại support

**2. Confirmation (Xác nhận):**
- Yếu tố phụ xác nhận trigger
- Ví dụ: RSI > 50, MACD histogram dương

**3. Confluence (Trùng hợp):**
- Nhiều yếu tố đồng thuận
- Ví dụ: S/R + Fib + EMA

### Entry Checklist mẫu
- [ ] Xu hướng TF lớn?
- [ ] Giá tại key level?
- [ ] Có trigger pattern?
- [ ] Có confirmation?
- [ ] RR tối thiểu 1:2?
- [ ] Không tin lớn trong 2 giờ?

### Golden Rule
Nếu **bất kỳ mục nào** trong checklist = No → **KHÔNG ENTRY**` },

  "4-2-2": { title: "Exit Rules", content: `### Exit Rules — Quy tắc thoát lệnh

### Stop Loss Placement

**1. Structure-based SL:**
- Buy: SL dưới swing low gần nhất
- Sell: SL trên swing high gần nhất

**2. ATR-based SL:**
- SL = Entry ± 1.5-2x ATR
- Tự động điều chỉnh theo volatility

**3. Pattern-based SL:**
- SL ngoài pattern (wick of pin bar, OB zone)

### Take Profit Strategy

**1. Fixed RR:**
- TP tại 1:2 hoặc 1:3 từ entry

**2. Partial TP:**
- TP1: 50% tại 1:1 → Move SL to BE
- TP2: 50% còn lại chạy với trailing stop

**3. Structure-based TP:**
- TP tại next S/R, swing high/low

### Break Even
Sau khi giá đi đúng 1R → Di chuyển SL về entry → **Risk-free trade**` },

  "4-2-3": { title: "Position Sizing", content: `[DIAGRAM:lot_calculation]

### Position Sizing Methods

**1. Fixed Percentage (Phổ biến nhất):**
- Rủi ro cố định % tài khoản mỗi lệnh
- Lot = (Account × Risk%) / (SL pips × Pip Value)
- Khuyên dùng: 1-2%

**2. Kelly Criterion:**
- f = (bp - q) / b
- b = avg win/avg loss, p = win rate, q = 1-p
- Tối ưu về mặt toán học nhưng aggressive
- Thực tế: Dùng Half Kelly (f/2)

**3. Anti-Martingale:**
- Tăng lot khi thắng, giảm khi thua
- Ngược với Martingale (tăng khi thua → CỰC KỲ NGUY HIỂM)

### Lời khuyên
- Mới bắt đầu: **Fixed 1%**
- Không bao giờ tăng lot vì "feel lucky"
- Tính lot TRƯỚC KHI vào lệnh, không sau` },

  "4-2-4": { title: "Timeframe & Session", content: `### Chọn TF và Session phù hợp

### Theo phong cách
| Phong cách | TF | Session |
|-----------|----|---------|
| Scalping | M1-M5 | London, NY overlap |
| Day Trade | M15-H1 | London, NY |
| Swing | H4-D1 | Phân tích mọi lúc |
| Position | D1-W1 | Phân tích cuối tuần |

### Theo lifestyle
- **Làm văn phòng:** Swing (check chart sáng + tối)
- **Full-time trader:** Day Trading hoặc Scalping
- **Bận rộn:** Position Trading (check 1 lần/tuần)

### Lưu ý
- Chọn 1 phong cách và **stick with it**
- Không nhảy TF liên tục
- TF phù hợp là TF bạn **thoải mái nhất**` },

  "4-2-5": { title: "Trading Plan", content: `### Trading Plan — Kế hoạch giao dịch

### Nội dung Trading Plan

**1. Mục tiêu:**
- Mục tiêu hàng tháng (% return)
- Mục tiêu dài hạn (1 năm)

**2. Chiến lược:**
- Phong cách trade (swing, day...)
- Cặp tiền trade
- Timeframe
- Entry/Exit rules

**3. Risk Management:**
- % rủi ro/lệnh
- Max lệnh cùng lúc
- Daily/Weekly loss limit

**4. Routine:**
- Giờ phân tích, giờ trade
- Review schedule

**5. Rules:**
- Không trade tin
- Không revenge trade
- Dừng khi thua X lệnh liên tiếp

### Quan trọng nhất
Trading Plan **PHẢI viết ra giấy** (hoặc file).
Trade plan, plan trade. Không có plan = gambling.` },

  "4-2-6": { title: "🔑 Pre-trade Checklist", content: `### Pre-trade Checklist

Danh sách kiểm tra **TRƯỚC MỖI LỆNH**.

### Checklist mẫu

**1. Market Context:**
- [ ] Xu hướng TF lớn (D1/H4)?
- [ ] Có tin lớn trong 2 giờ tới?
- [ ] Session nào? (Killzone?)

**2. Setup:**
- [ ] Giá tại key level?
- [ ] Có trigger pattern?
- [ ] Confluence (≥ 2 yếu tố)?

**3. Risk:**
- [ ] SL placement hợp lý?
- [ ] RR ≥ 1:2?
- [ ] Lot size đúng 1-2% risk?
- [ ] Không vượt max lệnh/ngày?

**4. Tâm lý:**
- [ ] Đầu óc tỉnh táo?
- [ ] Không revenge trade?
- [ ] Không FOMO?

### Quy tắc sắt
**1 mục = No → KHÔNG VÀO LỆNH**
In checklist ra, dán cạnh màn hình.` },

  "5-0-1": { title: "Risk per Trade Calculator", content: `[DIAGRAM:lot_calculation]

### Công thức
Lot Size = (Account Balance × Risk%) / (SL pips × Pip Value per Lot)

### Ví dụ tính nhanh

| Account | Risk% | SL (pips) | Pip Value | Lot Size |
|---------|-------|-----------|-----------|----------|
| $1,000 | 2% | 50 | $0.10/micro | 0.04 |
| $5,000 | 1% | 30 | $10/std | 0.17 |
| $10,000 | 2% | 40 | $10/std | 0.50 |

### Công cụ tính online
- Myfxbook Position Size Calculator
- BabyPips Pip Value Calculator
- MT4/5 built-in calculator

### Quy tắc
- LUÔN tính lot trước khi entry
- SL xa hơn → Lot nhỏ hơn (tự động)
- Không bao giờ round UP lot size` },

  "5-0-2": { title: "Risk:Reward Ratio", content: `[DIAGRAM:risk_reward]

### RR Ratio là gì?
Tỷ lệ giữa **mức rủi ro (SL)** và **mục tiêu lợi nhuận (TP)**.

### Tại sao RR quan trọng?

| RR | Win Rate cần để hòa vốn |
|----|-------------------------|
| 1:1 | 50% |
| 1:2 | 33% |
| 1:3 | 25% |
| 1:4 | 20% |

→ RR càng tốt, win rate cần càng THẤP!

### Ví dụ
RR 1:3, Win rate 40%:
- 10 lệnh: 4 thắng × $300 = $1,200
- 10 lệnh: 6 thua × $100 = $600
- **Lợi nhuận ròng = $600**

### Quy tắc
- Tối thiểu **RR 1:2** trước khi entry
- Tính RR TRƯỚC khi vào lệnh
- Nếu RR < 1:2 → **Bỏ qua setup**` },

  "5-0-3": { title: "Maximum Drawdown", content: `### Drawdown là gì?
Mức **sụt giảm** từ đỉnh equity đến đáy, trước khi phục hồi.

### Các loại Drawdown Limit

| Loại | Giới hạn | Hành động |
|------|---------|----------|
| Daily DD | 3-5% | Dừng trade ngày đó |
| Weekly DD | 8-10% | Dừng trade tuần đó |
| Monthly DD | 15-20% | Review toàn bộ hệ thống |
| Max DD | 25-30% | Dừng trade, backtest lại |

### Recovery Math
| Drawdown | % cần để phục hồi |
|----------|-------------------|
| 10% | 11% |
| 20% | 25% |
| 30% | 43% |
| 50% | **100%** |
| 70% | **233%** |

→ Drawdown càng lớn → Phục hồi càng KHÓ! Đó là lý do **bảo vệ vốn** quan trọng nhất.` },

  "5-0-4": { title: "Correlation Risk", content: `### Correlation Risk
Rủi ro khi mở nhiều lệnh trên cặp tiền tương quan.

### Cặp tiền tương quan cao
| Cặp 1 | Cặp 2 | Tương quan |
|-------|-------|----------|
| EUR/USD | GBP/USD | +0.85 (thuận) |
| EUR/USD | USD/CHF | -0.90 (ngược) |
| AUD/USD | NZD/USD | +0.90 (thuận) |

### Nguy hiểm
- Buy EUR/USD + Buy GBP/USD = **Gấp đôi rủi ro** (vì cùng hướng)
- Buy EUR/USD + Sell USD/CHF = **Gấp đôi rủi ro** (vì ngược nhau)

### Quy tắc
- Không mở cùng chiều trên 2+ cặp tương quan thuận
- Không mở ngược chiều trên 2+ cặp tương quan nghịch
- Max total exposure: 5-6% cùng lúc
- Dùng Myfxbook Correlation Tool để check` },

  "5-0-5": { title: "Hedging Strategies", content: `### Hedging trong Forex

### Direct Hedge
- Buy EUR/USD + Sell EUR/USD cùng lúc
- Lock lợi nhuận/lỗ
- Một số broker không cho phép

### Cross-Currency Hedge
- Buy EUR/USD + Buy USD/CHF
- 2 cặp tương quan ngược → Giảm rủi ro

### Khi nào Hedge?
- Trước tin lớn (bảo vệ vị thế)
- Khi không chắc chắn nhưng chưa muốn đóng lệnh
- Bảo vệ lợi nhuận

⚠️ Hedging KHÔNG phải "không mất tiền". Nó chỉ giảm rủi ro, nhưng cũng giảm lợi nhuận và tăng chi phí (spread × 2).` },

  "5-0-6": { title: "Scaling In / Scaling Out", content: `### Scaling In (Pyramiding)
Thêm vị thế khi giá đi đúng hướng.

**Quy tắc an toàn:**
- Chỉ scale in khi lệnh đầu tiên đã có lãi
- Mỗi lần thêm → Lot nhỏ hơn lần trước
- Di chuyển SL toàn bộ lên break even
- Tổng rủi ro không vượt 2-3%

### Scaling Out (Partial TP)
Đóng từng phần vị thế khi đạt target.

**Chiến lược phổ biến:**
- TP1: Đóng 50% tại 1:1 RR → Move SL to BE
- TP2: Đóng 30% tại 1:2 RR
- TP3: Đóng 20% cuối cùng với trailing stop

### Ưu điểm
- Lock lợi nhuận dần dần
- Giảm tâm lý "sợ mất lãi"
- Cho phép một phần position chạy theo trend` },

  "5-0-7": { title: "Black Swan Events", content: `### Black Swan trong Trading
Sự kiện cực kỳ hiếm, không lường trước, tác động lớn.

### Ví dụ Black Swan Forex
- **2015:** SNB bỏ peg EUR/CHF → CHF tăng 30% trong phút
- **2016:** Brexit → GBP giảm 1,800 pips
- **2020:** COVID crash → Volatility cực đoan

### Bảo vệ tài khoản

**1. Position Sizing:**
- Không bao giờ risk > 2%/lệnh
- Giới hạn total exposure

**2. Stop Loss luôn luôn:**
- LUÔN có SL cho mọi lệnh
- Guaranteed Stop Loss nếu broker cung cấp

**3. Diversification:**
- Không tập trung vào 1 cặp tiền
- Tránh quá nhiều vị thế cùng chiều

**4. Capital Reserve:**
- Chỉ trade với tiền bạn chấp nhận mất
- Giữ emergency fund riêng` },

  "5-1-0": { title: "Equity Curve Management", content: `### Equity Curve Management
Quản lý lot size dựa trên đường cong equity.

### Nguyên tắc
- Equity đang tăng → Giữ hoặc tăng nhẹ lot
- Equity đang giảm → GIẢM lot hoặc dừng trade

### Cách thực hiện
- Vẽ MA 20 trên equity curve
- Equity trên MA → Trade bình thường
- Equity dưới MA → Giảm lot 50% hoặc dừng

### Tại sao hiệu quả?
- Giảm thiệt hại khi losing streak
- Tối đa lợi nhuận khi winning streak
- Bảo vệ tâm lý — giảm áp lực khi drawdown` },

  "5-1-1": { title: "Compounding Calculator", content: `### Sức mạnh lãi kép

### Ví dụ Compounding
Vốn $1,000, lợi nhuận 5%/tháng:

| Tháng | Vốn |
|-------|-----|
| 0 | $1,000 |
| 3 | $1,158 |
| 6 | $1,340 |
| 12 | $1,796 |
| 24 | $3,225 |
| 36 | $5,792 |

### Quy tắc Compounding
- Tăng lot size **dần dần** theo equity
- Không rút hết lợi nhuận
- Mục tiêu **thực tế:** 3-5%/tháng (đã rất tốt)

⚠️ Mục tiêu 50-100%/tháng = UNREALISTIC. Bất kỳ ai hứa như vậy → Scam.` },

  "5-1-2": { title: "Withdrawal Strategy", content: `### Khi nào rút tiền?

### Chiến lược rút
1. **Milestone Withdrawal:** Rút khi đạt target cụ thể
2. **Percentage Withdrawal:** Rút % lợi nhuận hàng tháng
3. **Buffer Strategy:** Giữ base capital + rút excess

### Ví dụ
- Tài khoản $5,000
- Lợi nhuận tháng: $500
- Rút: 50% lợi nhuận = $250
- Giữ lại: $250 (compound)

### Quy tắc
- Rút lợi nhuận thường xuyên → Giữ motivation
- Không rút vốn gốc trừ khi cần thiết
- Giữ tối thiểu 6 tháng living expenses ngoài trading account` },

  "5-1-3": { title: "Account Allocation", content: `### Chia vốn cho nhiều chiến lược

### Mô hình phổ biến
- 60% vốn: Chiến lược chính (đã backtest kỹ)
- 25% vốn: Chiến lược phụ
- 15% vốn: Chiến lược thử nghiệm

### Multi-Account Approach
- Account 1: Conservative (1% risk, swing)
- Account 2: Moderate (2% risk, day trade)
- Account 3: Testing (demo/micro lot)

### Lợi ích
- Giảm concentration risk
- Test chiến lược mới không ảnh hưởng vốn chính
- Tâm lý thoải mái hơn` },

  "5-1-4": { title: "Performance Metrics", content: `### Metrics đánh giá hiệu suất

| Metric | Công thức | Tốt |
|--------|-----------|-----|
| **Sharpe Ratio** | (Return - Risk-free) / StdDev | > 1.0 |
| **Sortino Ratio** | Return / Downside StdDev | > 1.5 |
| **Profit Factor** | Gross Profit / Gross Loss | > 1.5 |
| **Max Drawdown** | Largest peak-to-trough | < 20% |
| **Win Rate** | Winning trades / Total | > 40% |
| **Expectancy** | Avg profit per trade | > 0 |
| **Recovery Factor** | Net Profit / Max DD | > 3 |

### Công cụ tracking
- **Myfxbook:** Auto-sync với MT4/5
- **FXBlue:** Analytics chi tiết
- **Excel/Notion:** Manual tracking

### Review cycle
- Weekly: Quick check metrics
- Monthly: Deep analysis, điều chỉnh
- Quarterly: Đánh giá toàn diện` },

  "5-1-5": { title: "Monte Carlo Simulation", content: `### Monte Carlo Simulation
Chạy **hàng ngàn kịch bản ngẫu nhiên** để stress test hệ thống.

### Cách hoạt động
1. Lấy kết quả backtest (chuỗi win/loss)
2. Xáo trộn ngẫu nhiên thứ tự lệnh
3. Chạy 1,000-10,000 simulations
4. Phân tích phân phối kết quả

### Kết quả Monte Carlo cho biết
- **Max Drawdown kỳ vọng** ở các mức xác suất
- **Xác suất ruin** (cháy tài khoản)
- **Best/Worst case** scenarios

### Ví dụ
- 95% confidence: Max DD < 25%
- 99% confidence: Max DD < 35%
- → Chuẩn bị tâm lý cho DD 25-35%

### Công cụ
- Forex Tester (có Monte Carlo built-in)
- Excel/Python custom simulation
- Online Monte Carlo calculators` },

  "6-0-2": { title: "Overtrading", content: `### Overtrading — Giao dịch quá nhiều

### Dấu hiệu
- Vào lệnh khi **không có setup** rõ ràng
- Trade 10+ lệnh/ngày (với day trader)
- Cảm thấy **phải trade** mỗi ngày
- Giảm lot để trade nhiều hơn

### Nguyên nhân
- Nghiện adrenaline
- FOMO
- Boredom (chán khi chờ setup)
- Muốn "gỡ" nhanh sau thua lỗ

### Giải pháp

**1. Giới hạn số lệnh/ngày:**
- Day Trader: Max 3-5 lệnh/ngày
- Swing Trader: Max 3-5 lệnh/tuần

**2. Quy tắc 3 strikes:**
- Thua 3 lệnh liên tiếp → Dừng trade ngày đó

**3. Quality over Quantity:**
- 1 lệnh tốt > 10 lệnh random
- "The best trade is sometimes no trade"` },

  "6-0-3": { title: "Loss Aversion", content: `### Loss Aversion & Sunk Cost Fallacy

### Loss Aversion
Nỗi đau mất $100 **mạnh gấp 2x** niềm vui được $100.

**Biểu hiện trong trading:**
- Di chuyển SL ra xa khi lệnh thua
- Không chịu cắt lỗ, hy vọng giá quay lại
- Chốt lời quá sớm (sợ mất lãi)

### Sunk Cost Fallacy
"Đã lỗ nhiều rồi, giữ thêm chờ hòa vốn."
- Kết quả: Lỗ 50 pips → Lỗ 200 pips → Cháy tài khoản

### Cách khắc phục

**1. SL cứng, không di chuyển:**
- Đặt SL KHI vào lệnh
- KHÔNG BAO GIỜ mở rộng SL

**2. Tư duy xác suất:**
- Mỗi lệnh thua là **chi phí kinh doanh**
- 100 lệnh tới mới quan trọng, không phải 1 lệnh này

**3. Pre-commit:**
- Chấp nhận mất SL TRƯỚC KHI vào lệnh
- Nếu không chấp nhận → Đừng vào` },

  "6-0-4": { title: "Confirmation Bias", content: `### Confirmation Bias
Chỉ tìm kiếm bằng chứng **ủng hộ** quan điểm sẵn có, bỏ qua bằng chứng ngược.

### Ví dụ trong Trading
- Đã buy EUR/USD → Chỉ đọc tin bullish, bỏ qua tin bearish
- Chart bearish nhưng vẫn tìm lý do để hold long
- Chỉ nhớ lệnh thắng, quên lệnh thua

### Cách khắc phục

**1. Devil's Advocate:**
- Với MỖI setup, tự hỏi: "Lý do KHÔNG vào lệnh là gì?"

**2. Neutral Analysis:**
- Phân tích chart TRƯỚC khi quyết định hướng
- Viết ra cả bull case VÀ bear case

**3. Trading Journal:**
- Ghi lý do entry trước khi vào
- Review: Đúng vì đúng lý do, hay đúng vì may mắn?` },

  "6-0-5": { title: "Recency Bias", content: `### Recency Bias
Đánh giá quá cao **sự kiện gần nhất**, bỏ qua bức tranh lớn.

### Ví dụ
- 5 lệnh gần nhất thắng → Tăng lot mạnh (overconfident)
- 3 lệnh gần nhất thua → Sợ, không dám entry (underconfident)
- Setup giống lệnh thua gần nhất → Bỏ qua dù setup tốt

### Cách khắc phục

**1. Focus on Sample Size:**
- 5-10 lệnh = KHÔNG đủ để đánh giá
- Cần 50-100+ lệnh mới có ý nghĩa thống kê

**2. Trading Journal:**
- Review 100 lệnh gần nhất, không phải 5
- Nhìn big picture, không zoom vào gần nhất

**3. Stick to Plan:**
- Quy trình không đổi bất kể kết quả gần nhất
- Hệ thống tốt → Kết quả tốt VỀ DÀI HẠN` },

  "6-0-6": { title: "Tilt / Emotional Hijacking", content: `### Tilt — Mất kiểm soát cảm xúc

### Tilt là gì?
Trạng thái cảm xúc chi phối hoàn toàn quyết định trading.

**Amygdala (não cảm xúc)** overrule **Prefrontal Cortex (não logic)**.

### Dấu hiệu Tilt
- Tim đập nhanh khi nhìn chart
- Quyết định trong vài giây thay vì phân tích
- Cảm giác PHẢI trade ngay
- Tức giận hoặc phấn khích quá mức

### Cách xử lý

**1. Nhận biết:**
- Self-awareness là bước đầu tiên
- Khi nhận ra mình tilt → DỪNG LẠI

**2. Circuit Breaker:**
- Thua 2-3 lệnh liên tiếp → Tắt platform
- Rời khỏi chart ít nhất 1 giờ

**3. Physical Reset:**
- Đứng dậy, đi lại
- Hít thở sâu 10 lần
- Uống nước, rửa mặt

**4. Rule:**
Không bao giờ trade khi: mệt, tức giận, buồn, say, hoặc quá vui` },

  "6-0-7": { title: "Mindfulness cho Trader", content: `### Mindfulness & Meditation

### Tại sao Trader cần Mindfulness?
- Giảm stress và lo âu
- Tăng khả năng tập trung
- Giúp nhận biết cảm xúc (trước khi bị tilt)
- Cải thiện quyết định

### Kỹ thuật đơn giản

**1. Hít thở 4-7-8:**
- Hít vào 4 giây
- Giữ 7 giây
- Thở ra 8 giây
- Lặp 4 lần trước khi trade

**2. Body Scan:**
- Quét cơ thể từ đầu đến chân
- Nhận biết căng thẳng ở đâu
- Thả lỏng từng vùng

**3. Trading Meditation:**
- 5-10 phút trước phiên trade
- Focus vào hơi thở
- Visualize trading plan

### Thói quen tốt
- Thiền 10 phút mỗi sáng
- Tập thể dục thường xuyên
- Ngủ đủ 7-8 tiếng` },

  "6-1-0": { title: "Trading Journal", content: `### Trading Journal — Nhật ký giao dịch

### Ghi chép gì?

Mỗi lệnh cần ghi:
- **Date/Time:** Ngày giờ entry/exit
- **Pair:** Cặp tiền
- **Direction:** Buy/Sell
- **Entry/Exit price:** Giá vào/ra
- **SL/TP:** Stop Loss, Take Profit
- **Lot size:** Khối lượng
- **Result:** Pips, $ profit/loss
- **Setup:** Lý do vào lệnh
- **Emotion:** Cảm xúc khi trade
- **Screenshot:** Chụp chart khi entry
- **Notes:** Bài học rút ra

### Công cụ Journal
- **Excel/Google Sheets:** Linh hoạt, miễn phí
- **Notion:** Template đẹp, đa năng
- **TradeZella:** Chuyên dụng cho trader

### Quan trọng nhất
Review journal mỗi tuần. Tìm pattern: Sai lầm lặp lại? Setup nào hiệu quả nhất?` },

  "6-1-1": { title: "Daily Routine", content: `### Daily Routine cho Trader

### Buổi sáng (Trước phiên)
1. Thiền/tập thể dục 10-30 phút
2. Đọc market overview (DailyFX, ForexLive)
3. Check Economic Calendar
4. Phân tích top-down: D1 → H4 → H1
5. Xác định key levels và scenarios
6. Viết trading plan cho ngày

### Trong phiên
7. Chờ setup — KHÔNG FORCE TRADE
8. Tuân thủ checklist trước mỗi lệnh
9. Quản lý lệnh theo plan

### Sau phiên
10. Review tất cả lệnh trong ngày
11. Ghi Trading Journal
12. Đánh giá tuân thủ plan: Pass/Fail
13. Rút bài học, ghi notes

### Quy tắc thép
- Không trade khi mệt hoặc cảm xúc bất ổn
- Dừng khi đạt daily target hoặc loss limit
- Trading là marathon, không phải sprint` },

  "6-1-2": { title: "Weekly/Monthly Review", content: `### Review Process

### Weekly Review (30 phút)
- Tổng P&L tuần
- Win rate, Average RR
- Best trade vs Worst trade
- Sai lầm lặp lại?
- Plan cho tuần tới

### Monthly Review (2 giờ)
- Tất cả metrics (Sharpe, PF, DD...)
- Equity curve analysis
- Chiến lược nào hoạt động tốt/xấu?
- Thị trường tháng này có gì đặc biệt?
- Mục tiêu tháng tới
- Cần điều chỉnh gì trong system?

### Key Questions
- Tôi có tuân thủ trading plan?
- Có revenge trade?
- Setup nào đem lại lợi nhuận nhất?
- Cặp tiền nào trade tốt nhất?
- Killzone nào hiệu quả nhất?` },

  "6-1-3": { title: "Process vs Outcome", content: `### Process-Oriented vs Outcome-Oriented

### Outcome-Oriented (SAI)
- Focus vào: Thắng hay thua? Bao nhiêu $?
- Lệnh thắng = tốt, lệnh thua = xấu
- Dẫn đến: Revenge trade, overtrading, emotional

### Process-Oriented (ĐÚNG)
- Focus vào: Tôi có tuân thủ plan?
- Lệnh thua theo plan = **THÀNH CÔNG** ✅
- Lệnh thắng không theo plan = **THẤT BẠI** ❌

### Mindset Shift
- Kết quả 1 lệnh = **irrelevant**
- Kết quả 100 lệnh = **significant**
- Quy trình đúng → Kết quả đúng về dài hạn

### Thực hành
- Sau mỗi lệnh: "Tôi có follow plan không?" (Yes/No)

  "7-0-2": { title: "Python for Trading", content: `### Python cho Trading

  "7-0-3": { title: "Backtesting Framework", content: `### Walk-Forward Analysis

### Backtesting cơ bản vs nâng cao

**In-Sample (IS):** Data dùng để optimize strategy
**Out-of-Sample (OOS):** Data dùng để validate

### Walk-Forward Analysis
1. Chia data thành nhiều segments
2. Optimize trên IS segment 1
3. Test trên OOS segment 1
4. Optimize trên IS segment 2
5. Test trên OOS segment 2
6. ... Lặp lại
7. Kết quả = tổng hợp tất cả OOS

### Tại sao quan trọng?
- Giảm **overfitting** (curve fitting)
- Kết quả thực tế hơn
- Đánh giá khả năng adapt của strategy

### Quy tắc
- IS : OOS = 70:30 hoặc 80:20
- Nếu OOS kết quả kém hơn nhiều IS → Overfitted` },

  "7-0-4": { title: "Optimization", content: `### Optimization & Tránh Overfitting

### Overfitting là gì?
Strategy hoạt động **hoàn hảo trên data cũ** nhưng **thất bại trên data mới**.

### Dấu hiệu Overfitting
- Backtest equity curve quá mượt
- Quá nhiều parameters
- Kết quả thay đổi nhiều khi thay đổi nhỏ parameter

### Cách tránh

**1. Giữ đơn giản:**
- Ít parameters = ít overfitting
- Max 3-5 parameters cho 1 strategy

**2. Out-of-Sample Testing:**
- Luôn test trên data strategy chưa "thấy"

**3. Walk-Forward Analysis:**
- Quy trình chuẩn như bài trước

**4. Robustness Testing:**
- Thay đổi nhỏ parameters → Kết quả vẫn tương tự?
- Test trên nhiều cặp tiền, nhiều timeframe` },

  "7-0-5": { title: "Machine Learning cơ bản", content: `### Machine Learning cho Trading

| Algorithm | Ứng dụng |
|-----------|--------|
| Random Forest | Classification |
| XGBoost | Feature importance |
| LSTM | Time series prediction |
| SVM | Pattern recognition |

### Thách thức
- **Data quality:** Garbage in = garbage out
- **Overfitting:** ML rất dễ overfit financial data
- **Non-stationary:** Thị trường thay đổi liên tục
- **Survivorship bias:** Chỉ thấy data sống sót

⚠️ ML trong trading là **cực kỳ khó**. 99% ML models thất bại trong real trading.` },
