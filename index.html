  "1-0-0": { title: "Forex là gì?", content: `**Forex (Foreign Exchange)** là thị trường trao đổi ngoại tệ lớn nhất thế giới với khối lượng giao dịch trung bình hơn **$7.5 nghìn tỷ USD mỗi ngày** (theo BIS 2022).

### Lịch sử hình thành
- **1944 - Bretton Woods:** Hệ thống tỷ giá cố định ra đời, các đồng tiền được neo vào USD, USD neo vào vàng ($35/oz).
- **1971 - Nixon Shock:** Tổng thống Nixon bãi bỏ việc đổi USD ra vàng, kết thúc Bretton Woods.
- **1973:** Hệ thống tỷ giá thả nổi chính thức bắt đầu → Forex hiện đại ra đời.
- **1990s:** Internet phát triển, retail trader bắt đầu tiếp cận thị trường qua broker online.

### Cấu trúc thị trường OTC
Forex là thị trường **phi tập trung (Over-The-Counter)**. Không có sàn giao dịch trung tâm như chứng khoán.

| Tier 3 | Broker, ECN | Trung gian cho retail trader |
| Tier 4 | Retail Traders | Chiếm ~5-6% volume |

  "1-0-3": { title: "Cách đọc báo giá", content: `### Base Currency & Quote Currency

Trong cặp **EUR/USD = 1.0850:**
- **EUR** = Base Currency (đồng tiền cơ sở)
- **USD** = Quote Currency (đồng tiền yết giá)
- Ý nghĩa: 1 EUR = 1.0850 USD

**Quy tắc:**
- **Mua (Buy/Long):** Bạn mua Base, bán Quote → Kỳ vọng giá TĂNG
- **Bán (Sell/Short):** Bạn bán Base, mua Quote → Kỳ vọng giá GIẢM

### Bid / Ask / Spread

| Thuật ngữ | Ý nghĩa | Ví dụ |
|-----------|---------|-------|
| **Bid** | Giá bạn BÁN được | 1.08**48** |
| **Ask** | Giá bạn MUA được | 1.08**50** |
| **Spread** | Ask - Bid = Chi phí giao dịch | 0.0002 = **2 pips** |

**Spread thay đổi theo:**
- Thời điểm: Overlap → spread thấp; đêm → spread cao
- Tin tức: Trước/sau NFP, FOMC → spread mở rộng đột biến
- Loại tài khoản: ECN thường spread thấp hơn + commission

### Ví dụ thực tế
Bạn mua EUR/USD tại Ask = 1.0850. Ngay lập tức vị thế của bạn đang lỗ 2 pip (spread). Giá cần tăng lên trên 1.0850 bạn mới bắt đầu có lãi.` },

  "1-0-4": { title: "🔑 Pip, Pipette, Point", content: `### Pip là gì?

**Pip (Percentage In Point)** là đơn vị đo lường nhỏ nhất của sự thay đổi giá.

**Quy tắc:**
- Hầu hết các cặp: **1 pip = 0.0001** (chữ số thập phân thứ 4)
- Các cặp JPY: **1 pip = 0.01** (chữ số thập phân thứ 2)

**Ví dụ:**
- EUR/USD: 1.0850 → 1.0860 = tăng **10 pips**
- USD/JPY: 149.50 → 149.80 = tăng **30 pips**

### Pipette (Point)
- **Pipette = 1/10 pip = 0.00001** (chữ số thứ 5)
- USD/JPY: pipette = 0.001 (chữ số thứ 3)
- Broker hiện nay thường báo giá 5 chữ số (fractional pip)

### Cách tính giá trị Pip

**Công thức:** Pip Value = (Pip / Tỷ giá) × Lot Size

| Lot Size | Đơn vị | Giá trị 1 pip (USD pairs) |
|----------|--------|---------------------------|
| Standard | 100,000 | ~$10 |
| Mini | 10,000 | ~$1 |
| Micro | 1,000 | ~$0.10 |
| Nano | 100 | ~$0.01 |

**Ví dụ thực tế:**
Bạn mua 1 lot EUR/USD, giá tăng 50 pips → Lợi nhuận = 50 × $10 = **$500**
Bạn mua 0.1 lot (mini), giá tăng 50 pips → Lợi nhuận = 50 × $1 = **$50**` },

  "1-0-5": { title: "Lot Size", content: `[DIAGRAM:lot_calculation]\n\n### Các loại Lot Size

| Loại | Đơn vị tiền | Ký hiệu MT4/5 | 1 pip (USD pair) |
|------|------------|----------------|------------------|
| **Standard** | 100,000 | 1.00 | $10 |
| **Mini** | 10,000 | 0.10 | $1 |
| **Micro** | 1,000 | 0.01 | $0.10 |

### Chọn Lot Size phù hợp

**Nguyên tắc vàng:** Lot size phải tính dựa trên **mức rủi ro cho phép**, KHÔNG phải cảm tính.

**Công thức:**
\`\`\`
Lot Size = (Tài khoản × % Rủi ro) / (SL pips × Pip Value)
\`\`\`

**Ví dụ:**
- Tài khoản: $1,000
- Rủi ro: 2% = $20
- Stop Loss: 50 pips
- Pip Value (micro lot): $0.10

→ Lot Size = $20 / (50 × $0.10) = $20 / $5 = **0.04 lot** (4 micro lots)

### Lời khuyên
- Mới bắt đầu: Dùng **micro lot (0.01)** để quản lý rủi ro
- Không bao giờ "all-in" toàn bộ vốn vào 1 lệnh
- Tăng lot size dần khi equity tăng, KHÔNG tăng theo cảm xúc` },

  "1-0-6": { title: "Leverage & Margin", content: `[DIAGRAM:leverage]\n\n### Leverage (Đòn bẩy)

Leverage cho phép bạn kiểm soát một vị thế LỚN HƠN số vốn thực có.

| Leverage | Vốn cần | Kiểm soát | Margin Required |
|----------|---------|-----------|-----------------|
| 1:1 | $100,000 | $100,000 | 100% |
| 1:50 | $2,000 | $100,000 | 2% |
| 1:100 | $1,000 | $100,000 | 1% |
| 1:500 | $200 | $100,000 | 0.2% |

### Margin

**Các thuật ngữ cần nhớ:**
- **Used Margin:** Số tiền bị "khóa" để duy trì vị thế mở
- **Free Margin:** Equity - Used Margin = Tiền còn lại để mở lệnh mới
- **Margin Level:** (Equity / Used Margin) × 100%

### Margin Call & Stop Out
- **Margin Call:** Khi Margin Level xuống mức cảnh báo (thường 100%) — Broker cảnh báo bạn nạp thêm tiền
- **Stop Out:** Khi Margin Level quá thấp (thường 20-50%) — Broker TỰ ĐỘNG đóng lệnh thua lỗ nhất

### ⚠️ Cảnh báo quan trọng
**Leverage là con dao hai lưỡi:**
- Leverage 1:100 → Giá đi đúng 1% = Lãi 100% vốn
- Leverage 1:100 → Giá đi sai 1% = **MẤT 100% vốn**

**Quy tắc:** Leverage cao không có nghĩa bạn phải dùng hết. Luôn quản lý lot size theo % rủi ro, KHÔNG theo leverage.` },

  "1-0-7": { title: "Swap / Rollover", content: `### Swap là gì?

**Swap (Rollover)** là phí/lãi qua đêm khi bạn giữ lệnh qua 00:00 giờ server (thường 00:00 GMT).

**Nguyên lý:** Mỗi đồng tiền có lãi suất riêng. Khi bạn mua 1 cặp tiền, bạn đang vay đồng Quote và gửi đồng Base.

### Cách tính Swap

**Swap = (Lãi suất Base - Lãi suất Quote) × Lot Size / 365**

**Ví dụ:**
- Mua AUD/JPY: Lãi suất AUD = 4.35%, JPY = -0.10%
- Swap dương: Bạn NHẬN tiền mỗi đêm giữ lệnh Buy
- Bán AUD/JPY: Swap âm — bạn TRẢ tiền mỗi đêm

### Triple Swap Wednesday
Vào **thứ 4**, swap bị tính **gấp 3 lần** (bù cho thứ 7 và CN không tính).

### Carry Trade
Chiến lược mua đồng tiền lãi suất cao, bán đồng tiền lãi suất thấp để hưởng swap dương.

**Ví dụ kinh điển:** Mua NZD/JPY, AUD/JPY — lãi suất NZD/AUD cao, JPY gần 0%.

⚠️ **Rủi ro:** Biến động tỷ giá có thể xóa sạch lợi nhuận swap.` },

  "1-0-8": { title: "Các loại lệnh", content: `### Market Order (Lệnh thị trường)
Mua/bán **ngay lập tức** tại giá hiện tại. Dùng khi cần vào lệnh nhanh.

### Pending Orders (Lệnh chờ)

| Loại lệnh | Khi nào dùng | Ví dụ |
|-----------|-------------|-------|
| **Buy Limit** | Mua ở giá THẤP HƠN hiện tại | Giá đang 1.0850, đặt Buy Limit 1.0800 |
| **Sell Limit** | Bán ở giá CAO HƠN hiện tại | Giá đang 1.0850, đặt Sell Limit 1.0900 |
| **Buy Stop** | Mua ở giá CAO HƠN hiện tại | Breakout trade: đặt Buy Stop trên resistance |
| **Sell Stop** | Bán ở giá THẤP HƠN hiện tại | Breakout trade: đặt Sell Stop dưới support |

### Stop Loss & Take Profit
- **Stop Loss (SL):** Tự động đóng lệnh khi lỗ đến mức chấp nhận → **BẢO VỆ VỐN**
- **Take Profit (TP):** Tự động đóng lệnh khi đạt mục tiêu lợi nhuận

### Trailing Stop
Stop Loss **di chuyển theo giá** khi giá đi đúng hướng.

Ví dụ: Buy EUR/USD tại 1.0850, Trailing Stop 30 pips:
- Giá lên 1.0900 → SL tự động di chuyển lên 1.0870
- Giá lên 1.0950 → SL tự động di chuyển lên 1.0920
- Giá quay đầu giảm → SL giữ nguyên tại 1.0920

### OCO (One Cancels Other)
Đặt 2 lệnh chờ — khi 1 lệnh được kích hoạt, lệnh còn lại tự động hủy. Dùng cho breakout trading.` },

  "1-1-0": { title: "🔑 Chọn broker uy tín", content: `### Tiêu chí đánh giá Broker

  "1-1-2": { title: "🔑 Tài khoản Demo", content: `### Tại sao phải trade Demo?

Demo là bước **KHÔNG THỂ BỎ QUA**. Đây là nơi bạn:

### Cách sử dụng Demo hiệu quả

**Cách đúng:**

### Khi nào chuyển sang Live?

✅ Hiểu rõ risk management
✅ Tâm lý ổn định, không vào lệnh theo cảm xúc` },

  "1-1-4": { title: "Economic Calendar", content: `### Economic Calendar là gì?

### Cách đọc Economic Calendar

**Mức tác động:**
- 🔴 **High Impact:** NFP, CPI, FOMC, GDP — Biến động rất mạnh, có thể 50-200 pips

**Các cột quan trọng:**

### Quy tắc giao dịch khi có tin

- **Actual < Forecast:** Tiêu cực → có thể giảm giá

### Công cụ Calendar phổ biến
